<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Vocabit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#334155;--primary-dark:#1e293b;--primary-light:#f1f5f9;
  --success:#22c55e;--success-bg:#f0fdf4;
  --danger:#f43f5e;--danger-bg:#fff1f2;
  --bg:#f8fafc;--card:#fff;
  --text:#0f172a;--muted:#64748b;--border:#e2e8f0;
  --shadow:0 .0625em .25em rgba(0,0,0,.06),0 .0625em .125em rgba(0,0,0,.04);
  --shadow-md:0 .25em 1em rgba(51,65,85,.1);
  --radius:0.875em;
}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.5;font-size:1em}
.wrap{max-width:48em;margin:0 auto;padding:1em}
/* TITLE */
h1{text-align:left;padding:1.25em 0 .875em}
.logo-brand{display:block;font-size:2em;font-weight:800;letter-spacing:-.04em;color:var(--primary-dark);line-height:1.1}
.logo-sub{display:none}
.screen{display:none}.screen.active{display:block}
/* CARD */
.card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:1.25em;margin-bottom:.875em;box-shadow:var(--shadow)}
/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;padding:.7em 1.2em;border-radius:.625em;border:none;font-size:.9em;font-weight:600;cursor:pointer;transition:all .15s;gap:.35em;font-family:inherit;letter-spacing:-.01em}
.btn-p{background:var(--primary);color:#fff;box-shadow:0 .125em .5em rgba(51,65,85,.2)}
.btn-p:hover{background:var(--primary-dark);box-shadow:0 .25em .75em rgba(51,65,85,.28);transform:translateY(-.06em)}
.btn-s{background:var(--card);color:var(--text);border:1.5px solid var(--border)}
.btn-s:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-light)}
.btn-danger{background:var(--danger);color:#fff;box-shadow:0 .125em .5em rgba(244,63,94,.22)}
.btn-danger:hover{background:#e11d48;transform:translateY(-.06em)}
.btn:active{transform:scale(.97)}
.btn-full{width:100%;margin-bottom:.5em}
/* HOME GRID */
.home-btn-grid{display:grid;grid-template-columns:1fr 1fr;gap:.5em;margin-bottom:.75em}
.home-btn{font-size:.82em;padding:.65em .5em;margin-bottom:0;width:100%;border-radius:.625em}
/* SOURCE GROUP */
.src-title{font-size:.88em;font-weight:700;color:var(--primary);margin-bottom:.5em;padding-bottom:.35em;border-bottom:2px solid var(--primary-light)}
.sec-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(8em,1fr));gap:.375em;margin-bottom:.375em}
.sec-chip{display:flex;align-items:center;gap:.25em;padding:.4em .55em;border-radius:.5em;border:1.5px solid var(--border);background:var(--card);cursor:pointer;font-size:.8em;transition:all .15s;user-select:none;font-family:inherit}
.sec-chip:hover{border-color:var(--primary);background:var(--primary-light)}
.sec-chip.sel{border-color:var(--primary);background:var(--primary-light);color:var(--primary);font-weight:600}
.sec-chip input{display:none}
.badge{display:inline-block;background:var(--primary);color:#fff;border-radius:1em;padding:.05em .4em;font-size:.7em;font-weight:700;margin-left:.1em}
.sel-btn{font-size:.72em;padding:.25em .55em;border-radius:.4em}
/* FLASHCARD */
.fc-wrap{margin:1em 0}
.fc{width:100%;min-height:14em;cursor:pointer;border-radius:var(--radius);background:linear-gradient(135deg,var(--primary),#475569);color:#fff;padding:2em 1.5em;text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center;user-select:none;box-shadow:var(--shadow-md);touch-action:pan-y;transition:transform .15s,opacity .15s}
.fc-top{display:flex;align-items:center;justify-content:center;gap:.625em}
.fc-hint{font-size:.78em;opacity:.6;margin-top:.5em}
.fc-inner-reveal{display:none;margin-top:.875em;border-top:1.5px solid rgba(255,255,255,.2);padding-top:.875em;width:100%}
.fc-inner-reveal.show{display:block}
.fc-ko{font-size:1.2em;font-weight:700;color:#fff;margin-bottom:.2em}
.fc-sec{font-size:.68em;color:rgba(255,255,255,.5);margin-top:.4em}
.etym-box{margin-top:.75em;background:rgba(255,255,255,.15);border-radius:.5em;padding:.6em .8em;text-align:left}
.etym-title{font-size:.7em;font-weight:700;color:rgba(255,255,255,.9);margin-bottom:.3em;letter-spacing:.02em}
.etym-roots{display:flex;flex-wrap:wrap;align-items:center;gap:.3em;font-size:.8em;margin-bottom:.3em}
.etym-part{background:rgba(255,255,255,.25);border-radius:.35em;padding:.1em .4em;font-weight:700;color:#fff}
.etym-plus{color:rgba(255,255,255,.5);font-weight:700;margin:0 .1em}
.etym-meaning{color:rgba(255,255,255,.7);font-size:.85em}
.etym-tip{font-size:.76em;color:rgba(255,255,255,.82);font-style:italic;line-height:1.45;margin-top:.25em}
.fc-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:1000;display:none;align-items:center;justify-content:center;padding:1.25em;backdrop-filter:blur(4px)}
.fc-overlay.show{display:flex}
.fc-ov-card{width:100%;max-width:44em;background:linear-gradient(135deg,var(--primary),#475569);border-radius:1.25em;padding:2.5em 1.5em;color:#fff;min-height:65vh;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;box-shadow:0 1.5em 4em rgba(0,0,0,.5);transition:transform .12s,opacity .12s;touch-action:pan-y}
.cw{font-size:1.9em;font-weight:800;letter-spacing:-.02em}
.cm{font-size:1.1em;color:var(--muted);font-weight:500}
/* OPT ROW */
.opt-row{display:flex;align-items:center;gap:.375em}
.opt-row .opt{flex:1;text-align:left}
/* WRONG ANSWERS */
.wrong-item{display:flex;align-items:center;justify-content:space-between;padding:.625em .875em;border-radius:.625em;border:1.5px solid var(--border);background:var(--card);margin-bottom:.5em}
.wrong-cnt{font-size:.72em;color:#fff;background:var(--danger);border-radius:1em;padding:.1em .55em;font-weight:700;white-space:nowrap;margin-left:.5em}
/* QUIZ */
.counter{text-align:center;color:var(--muted);font-size:.82em;margin-bottom:.375em;font-weight:500}
.prog-bar{height:.35em;background:var(--border);border-radius:.25em;margin-bottom:1em;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(to right,var(--primary),#64748b);border-radius:.25em;transition:width .3s}
.q-text{font-size:1.45em;font-weight:800;text-align:center;margin-bottom:1em;letter-spacing:-.025em;line-height:1.2}
.opts{display:grid;gap:.5em}
.opt{padding:.8em 1em;border-radius:.625em;border:1.5px solid var(--border);background:var(--card);cursor:pointer;font-size:.9em;text-align:left;transition:all .15s;font-family:inherit;font-weight:500}
.opt:hover:not(:disabled){border-color:var(--primary);background:var(--primary-light)}
.opt.ok{border-color:var(--success);background:var(--success-bg);color:#15803d;font-weight:600}
.opt.bad{border-color:var(--danger);background:var(--danger-bg);color:#be123c}
.opt:disabled{cursor:not-allowed}
.expl{background:var(--bg);border:1.5px solid var(--border);border-radius:.625em;padding:.875em;margin-top:.875em;display:none}
.expl.show{display:block}
.etym-expl-box{margin-top:.5em;padding:.6em .75em;background:var(--primary-light);border-radius:.5em;font-size:.8em;border-left:.2em solid var(--primary)}
/* QUIZ TYPE INPUT */
.q-type-input{width:100%;padding:.75em 1em;border-radius:.625em;border:1.5px solid var(--border);font-size:.9em;font-family:inherit;font-weight:500;outline:none;transition:border-color .15s,box-shadow .15s;box-sizing:border-box;background:var(--card)}
.q-type-input:focus{border-color:var(--primary);box-shadow:0 0 0 .2em rgba(51,65,85,.1)}
/* TTS */
.tts{background:none;border:1.5px solid var(--border);border-radius:.5em;padding:.3em .75em;cursor:pointer;font-size:1.05em;color:var(--muted);transition:all .15s}
.tts:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-light)}
/* NAV */
.nav{display:flex;gap:.5em;margin-top:.875em}.nav .btn{flex:1}
/* RESULT */
.result{text-align:center;padding:1.5em 1em}
.score{font-size:3.5em;font-weight:800;color:var(--primary-dark);letter-spacing:-.03em;line-height:1}
/* CHIPS DISABLED */
.chip-na{opacity:.35;cursor:not-allowed}
.chip-na:hover{border-color:var(--border);background:var(--card)}
/* ETYMOLOGY BROWSER */
.etym-group{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:1em;margin-bottom:.875em;box-shadow:var(--shadow)}
.etym-group-hd{display:flex;align-items:center;gap:.5em;margin-bottom:.6em;flex-wrap:wrap}
.etym-root-badge{background:var(--primary);color:#fff;border-radius:.4em;padding:.12em .5em;font-size:.82em;font-weight:700}
.etym-root-meaning{color:var(--muted);font-size:.8em}
.etym-word-item{display:flex;align-items:baseline;gap:.5em;padding:.3em 0;border-bottom:1px solid var(--border)}
.etym-word-item:last-child{border-bottom:none}
.etym-en{font-weight:700;font-size:.9em}
.etym-ko{color:var(--muted);font-size:.78em}
.opt-expl-row{display:flex;align-items:center;gap:.3em;padding:.3em 0;border-bottom:1px solid var(--border);font-size:.8em}
/* SECTION BADGE */
#q-badge{font-size:.72em;color:var(--muted);margin-bottom:.375em;font-weight:600;letter-spacing:.03em;text-transform:uppercase}
/* SEL INFO */
.sel-row{display:flex;gap:.375em;margin-bottom:.5em}
@media(max-width:30em){
  h1{padding:1em 0 .75em}
  .logo-brand{font-size:1.65em}
  .cw{font-size:1.5em}
  .q-text{font-size:1.1em}
  .sec-grid{grid-template-columns:repeat(2,1fr)}
}
/* FAVORITES */
.btn-fav{background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff;box-shadow:0 .125em .5em rgba(245,158,11,.28);border:none}
.btn-fav:hover{background:linear-gradient(135deg,#d97706,#b45309);transform:translateY(-.06em);box-shadow:0 .25em .75em rgba(245,158,11,.35)}
.fav-star{background:none;border:1.5px solid rgba(255,255,255,.4);border-radius:.5em;padding:.28em .5em;cursor:pointer;font-size:1em;color:rgba(255,255,255,.6);transition:all .15s;line-height:1;flex-shrink:0}
.fav-star:hover{border-color:#f59e0b;color:#f59e0b;background:rgba(245,158,11,.15)}
.fav-star.active{color:#f59e0b;border-color:#f59e0b;background:rgba(245,158,11,.18)}
/* HOME SECTION LABEL */
.home-sec-label{font-size:.72em;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;padding:.75em 0 .35em;border-bottom:1px solid var(--border);margin-bottom:.4em}
/* SELECTED STATE */
.btn-sel{background:var(--primary)!important;color:#fff!important;border-color:var(--primary)!important}
.btn-sel:hover{background:var(--primary-dark)!important}
/* FAV WORD LIST */
.fav-word-row{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:.7em .9em;margin-bottom:.4em;display:flex;align-items:center;gap:.6em;transition:border-color .15s}
.fav-word-row:hover{border-color:var(--primary)}
</style>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
</head>
<body>
<div class="wrap">
<h1><span class="logo-brand">Vocabit</span><span class="logo-sub">영단어 학습 & 퀴즈</span></h1>

<!-- HOME -->
<div id="sc-home" class="screen active">
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:.5em;margin-bottom:.125em">
    <button class="btn btn-p" style="padding:.9em .6em;font-size:.92em;font-weight:700" onclick="goStudy()">📖 단어 학습</button>
    <button class="btn btn-fav" id="home-fav-btn" style="padding:.9em .6em;font-size:.92em;font-weight:700" onclick="goFavorites()">⭐ 즐겨찾기</button>
  </div>
  <div class="home-sec-label">퀴즈</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:.4em;margin-bottom:.125em">
    <button class="btn btn-p home-btn" style="font-size:.84em" onclick="goQuiz('both')">🎯 영↔한</button>
    <button class="btn btn-s home-btn" style="font-size:.84em" onclick="goQuiz('en-ko')">📝 영→한</button>
    <button class="btn btn-s home-btn" style="font-size:.84em" onclick="goQuiz('ko-en')">📝 한→영</button>
    <button class="btn btn-s home-btn" style="font-size:.84em" onclick="goQuiz('type')">✏️ 직접입력</button>
  </div>
  <div class="home-sec-label">복습 & 기타</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:.4em;margin-bottom:.875em">
    <button class="btn btn-danger home-btn" id="home-wrong-btn" style="font-size:.84em" onclick="goWrongFromHome()">❌ 오답 복습</button>
    <button class="btn btn-s home-btn" style="font-size:.84em" onclick="goEtymBrowse()">🌿 어원별 학습</button>
    <button class="btn btn-s home-btn" style="grid-column:1/-1;font-size:.84em" onclick="goHistory()">📊 회독 체크</button>
  </div>
  <div class="card">
    <div class="src-title" style="display:flex;align-items:center;justify-content:space-between">
      <span>켈리지텔프 독해 단어</span>
      <div style="display:flex;gap:.375em">
        <button class="btn btn-s sel-btn" onclick="selAll('k')">전체선택</button>
        <button class="btn btn-s sel-btn" onclick="selNone('k')">전체해제</button>
      </div>
    </div>
    <div class="sec-grid" id="grid-k"></div>
  </div>
  <div class="card">
    <div class="src-title" style="display:flex;align-items:center;justify-content:space-between">
      <span>정재현 영어</span>
      <div style="display:flex;gap:.375em">
        <button class="btn btn-s sel-btn" onclick="selAll('j')">전체선택</button>
        <button class="btn btn-s sel-btn" onclick="selNone('j')">전체해제</button>
      </div>
    </div>
    <div class="sec-grid" id="grid-j"></div>
  </div>
  <div id="sel-info" class="card" style="text-align:center;padding:.625em;display:none">
    선택된 단어: <strong id="sel-count">0</strong>개
  </div>
</div>

<!-- STUDY -->
<div id="sc-study" class="screen">
  <div class="counter" id="st-counter"></div>
  <div class="prog-bar"><div class="prog-fill" id="st-prog"></div></div>
  <div class="fc-wrap">
    <div class="fc" id="fc" onclick="openFcExpand()">
      <div class="fc-top">
        <button class="fav-star" id="fav-btn" onclick="event.stopPropagation();toggleFavorite(stWords[stIdx].en)" title="즐겨찾기">☆</button>
        <div class="cw" id="st-word"></div>
        <button class="tts" onclick="event.stopPropagation();ttsWord()" title="발음">🔊</button>
      </div>
      <div class="fc-hint" id="fc-hint">클릭하면 뜻이 보입니다</div>
      <div class="fc-inner-reveal" id="fc-reveal">
        <div class="fc-ko" id="st-ko"></div>
        <div class="fc-sec" id="st-sec"></div>
        <div class="etym-box" id="st-etym" style="display:none">
          <div class="etym-title">📖 어원으로 기억하기</div>
          <div class="etym-roots" id="st-etym-roots"></div>
          <div class="etym-tip" id="st-etym-tip"></div>
        </div>
      </div>
    </div>
  </div>
  <div class="nav">
    <button class="btn btn-s" onclick="stPrev()">← 이전</button>
    <button class="btn btn-s" onclick="stShuffle()">🔀</button>
    <button class="btn btn-p" onclick="stNext()">다음 →</button>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:.4em;margin-top:.5em">
    <button class="btn btn-s" onclick="goHome()">← 홈으로</button>
    <button class="btn btn-fav" id="go-fav-btn" onclick="goFavorites()" style="font-size:.85em">⭐ 즐겨찾기</button>
  </div>
</div>

<!-- QUIZ -->
<div id="sc-quiz" class="screen">
  <div class="counter" id="q-counter"></div>
  <div class="prog-bar"><div class="prog-fill" id="q-prog"></div></div>
  <div class="card">
    <div id="q-badge" style="margin-bottom:.375em"></div>
    <div class="q-text" id="q-text"></div>
    <div id="q-meaning-reveal" style="display:none;text-align:center;color:var(--muted);font-size:.9em;margin:-6px 0 10px;line-height:1.4"></div>
    <div style="text-align:center;margin-bottom:.875em">
      <button class="tts" id="q-tts" onclick="ttsQuiz()">🔊</button>
    </div>
    <div class="opts" id="q-opts"></div>
    <div id="q-type-area" style="display:none;margin-top:.75em">
      <input type="text" id="q-type-input" class="q-type-input"
        placeholder="한국어 뜻을 입력하세요..."
        onkeydown="if(event.key==='Enter')checkTyped()">
      <div style="display:flex;gap:.5em;margin-top:.5em">
        <button class="btn btn-p" style="flex:1" onclick="checkTyped()">✓ 확인</button>
        <button class="btn btn-s" style="color:var(--muted)" onclick="passTyped()">⏭ 패스</button>
      </div>
    </div>
    <div class="expl" id="q-expl">
      <div id="q-expl-body"></div>
    </div>
  </div>
  <button class="btn btn-p btn-full" id="q-next" onclick="nextQ()" style="display:none">다음 →</button>
  <button class="btn btn-s btn-full" onclick="goHome()">← 홈으로</button>
</div>

<!-- RESULT -->
<div id="sc-result" class="screen">
  <div class="card result">
    <div style="font-size:1.05em;margin-bottom:.375em;font-weight:600">퀴즈 완료! 🎉</div>
    <div class="score" id="r-score"></div>
    <div style="color:var(--muted);margin-top:.375em" id="r-detail"></div>
    <div style="color:var(--danger);margin-top:.625em;font-weight:600;font-size:.9em" id="r-wrong-info"></div>
  </div>
  <button class="btn btn-p btn-full" onclick="restartQuiz()">🔄 다시 풀기</button>
  <button class="btn btn-danger btn-full" id="r-wrong-btn" style="display:none;margin-bottom:.5em" onclick="goWrongReview()">❌ 오답 확인하기</button>
  <button class="btn btn-s btn-full" onclick="goHome()">← 홈으로</button>
</div>

<!-- ETYMOLOGY BROWSER -->
<div id="sc-etym-browse" class="screen">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.5em">
    <div style="font-size:1.05em;font-weight:700">🌿 어원별 단어 모아보기</div>
    <button class="btn btn-s" style="font-size:.78em;padding:.3em .7em" onclick="goHome()">← 홈</button>
  </div>
  <div style="font-size:.82em;color:var(--muted);margin-bottom:1em">같은 어원을 공유하는 단어끼리 묶어 보여줍니다. (2개 이상인 그룹만 표시)</div>
  <div id="etym-browse-list"></div>
  <button class="btn btn-s btn-full" style="margin-top:.5em" onclick="goHome()">← 홈으로</button>
</div>

<!-- HISTORY TRACKER -->
<div id="sc-history" class="screen">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.375em">
    <div style="font-size:1.05em;font-weight:700">📊 회독 체크</div>
    <div style="display:flex;gap:.4em;align-items:center">
      <span style="font-size:.75em;color:var(--muted)"><span style="display:inline-block;width:.85em;height:.85em;background:var(--danger);border-radius:.2em;vertical-align:middle"></span> 오답 &nbsp;<span style="display:inline-block;width:.85em;height:.85em;background:var(--success);border-radius:.2em;vertical-align:middle"></span> 정답</span>
      <button class="btn btn-s" style="font-size:.72em;padding:.3em .65em;color:var(--danger);border-color:var(--danger)" onclick="clearHistory()">초기화</button>
    </div>
  </div>
  <div style="font-size:.8em;color:var(--muted);margin-bottom:.875em">오답 경험이 있는 단어별로 최대 10칸까지 기록됩니다.</div>
  <div id="history-list"></div>
  <button class="btn btn-s btn-full" style="margin-top:.5em" onclick="goHome()">← 홈으로</button>
</div>

<!-- FAVORITES -->
<div id="sc-favorites" class="screen">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.75em">
    <div style="font-size:1.1em;font-weight:800;color:var(--primary-dark)">⭐ 즐겨찾기</div>

function toggle(id){
  const cb=document.querySelector(`input[value="${id}"]`);
  const chip=cb&&cb.closest('.sec-chip');
  if(selSecs.has(id)){selSecs.delete(id);chip&&chip.classList.remove('sel');}
  else{selSecs.add(id);chip&&chip.classList.add('sel');}
  updateInfo();
}
function selAll(src){
  SECTIONS.filter(s=>s.src===src&&s.words.length>0).forEach(s=>{
    selSecs.add(s.id);
    const cb=document.querySelector(`input[value="${s.id}"]`);
    cb&&cb.closest('.sec-chip').classList.add('sel');
    if(cb)cb.checked=true;
  });updateInfo();
}
function selNone(src){
  SECTIONS.filter(s=>s.src===src).forEach(s=>{
    selSecs.delete(s.id);
    const cb=document.querySelector(`input[value="${s.id}"]`);
    cb&&cb.closest('.sec-chip').classList.remove('sel');
    if(cb)cb.checked=false;
  });updateInfo();
}
function updateInfo(){
  const w=getWords();
  const el=document.getElementById('sel-info');
  document.getElementById('sel-count').textContent=w.length;
  el.style.display=w.length?'block':'none';
}
function getWords(){
  if(!selSecs.size)return[];
  const map=new Map();
  SECTIONS.forEach(sec=>{
    if(!selSecs.has(sec.id))return;
    sec.words.forEach(w=>{
      const k=w.en.toLowerCase().trim();
      if(map.has(k)){
        const ex=map.get(k);
        w.ko.forEach(m=>{if(!ex.ko.includes(m))ex.ko.push(m);});
        if(!ex.secs.includes(sec.name))ex.secs.push(sec.name);
      }else{
        map.set(k,{en:w.en,ko:[...w.ko],secs:[sec.name]});
      }
    });
  });
  return[...map.values()];
}

}

(function(){

    if(!swiping||!fcExpanded)return;swiping=false;
    const card=document.getElementById('fc-ov-card');if(!card)return;

function goQuiz(mode){
  merged=getWords();
  if(!merged.length){alert('섹션을 선택해주세요!');return;}
  if(merged.length<2){alert('최소 2개 이상의 단어가 필요합니다!');return;}
  isWrongQuizMode=false;
  qMode=mode;qScore=0;qIdx=0;wrongMap=new Map();
  qQuestions=buildQuestions(merged,mode);
  showSc('quiz');renderQ();
}
function buildQuestions(words,mode){
  const qs=[];
  words.forEach(w=>{
    if(mode==='en-ko'||mode==='both')qs.push({type:'en-ko',word:w});
    if(mode==='ko-en'||mode==='both')qs.push({type:'ko-en',word:w});
    if(mode==='type')qs.push({type:'type',word:w});
  });
  return qs.sort(()=>Math.random()-.5);
}
function etymHTML(enKey){
  const e=ETYM[enKey.toLowerCase()];
  if(!e)return'';
  const roots=e.r.map((r,i)=>{
    const plus=i>0?`<span style="color:var(--muted);margin:0 2px">+</span>`:'';
    return plus+`<span style="background:var(--primary);color:#fff;border-radius:.3em;padding:.1em .4em;font-size:.82em;font-weight:700">${r.p}</span><span style="color:var(--muted);font-size:.8em"> (${r.m})</span>`;
  }).join('');
  return`<div class="etym-expl-box">
    <div style="font-weight:700;color:var(--primary);font-size:.78em;margin-bottom:.25em">📖 어원</div>
    <div style="display:flex;flex-wrap:wrap;align-items:center;gap:.2em;margin-bottom:.3em">${roots}</div>
    <div style="color:var(--text);font-style:italic;line-height:1.45;font-size:.82em">${e.t}</div>
  </div>`;
}
function distractorWords(word,type,n){
  const pool=shuffle(merged.filter(w=>w.en!==word.en));
  const res=[];const seen=new Set();
  const ck=type==='en-ko'?word.ko.slice(0,Math.min(2,word.ko.length)).join(' / '):word.en;
  seen.add(ck);
  for(let i=0;i<pool.length&&res.length<n;i++){
    const w=pool[i];
    const key=type==='en-ko'?w.ko.slice(0,Math.min(2,w.ko.length)).join(' / '):w.en;
    if(!seen.has(key)){seen.add(key);res.push(w);}
  }
  return res;
}
function renderQ(){
  const q=qQuestions[qIdx];const w=q.word;
  document.getElementById('q-counter').textContent=`${qIdx+1} / ${qQuestions.length}`;
  document.getElementById('q-prog').style.width=((qIdx+1)/qQuestions.length*100)+'%';
  document.getElementById('q-next').style.display='none';
  document.getElementById('q-expl').classList.remove('show');
  document.getElementById('q-opts').style.display='';
  document.getElementById('q-type-area').style.display='none';
  const mr=document.getElementById('q-meaning-reveal');mr.style.display='none';mr.textContent='';
  qOptWordsMap={};qEnWord=w.en;
  if(q.type==='en-ko'){
    document.getElementById('q-badge').textContent='영어 → 한국어';
    document.getElementById('q-text').textContent=w.en;
    document.getElementById('q-tts').style.display='inline-flex';
    const correct=w.ko.slice(0,Math.min(2,w.ko.length)).join(' / ');
    const dWords=distractorWords(w,'en-ko',1);
    qOptWordsMap[correct]=w;
    dWords.forEach(dw=>{qOptWordsMap[dw.ko.slice(0,Math.min(2,dw.ko.length)).join(' / ')]=dw;});
    const opts=shuffle([correct,...dWords.map(dw=>dw.ko.slice(0,Math.min(2,dw.ko.length)).join(' / '))]);
    renderOpts(opts,correct,w,'en-ko');
  }else if(q.type==='ko-en'){
    document.getElementById('q-badge').textContent='한국어 → 영어';
    document.getElementById('q-text').textContent=w.ko.slice(0,Math.min(2,w.ko.length)).join(' / ');
    document.getElementById('q-tts').style.display='none';
    const dWords=distractorWords(w,'ko-en',1);
    qOptWordsMap[w.en]=w;
    dWords.forEach(dw=>{qOptWordsMap[dw.en]=dw;});
    const opts=shuffle([w.en,...dWords.map(dw=>dw.en)]);
    renderOpts(opts,w.en,w,'ko-en');
  }else{
    document.getElementById('q-badge').textContent='직접 입력';
    document.getElementById('q-text').textContent=w.en;
    document.getElementById('q-tts').style.display='inline-flex';
    document.getElementById('q-opts').style.display='none';
    const ta=document.getElementById('q-type-area');
    ta.style.display='block';
    const inp=document.getElementById('q-type-input');
    inp.value='';inp.disabled=false;
    setTimeout(()=>inp.focus(),100);
  }
}
function distractors(word,type,n){
  return distractorWords(word,type,n).map(w=>type==='en-ko'?w.ko.slice(0,Math.min(2,w.ko.length)).join(' / '):w.en);
}
function shuffle(a){
  const b=[...a];
  for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}
  return b;
}
function renderOpts(opts,correct,word,type){
  const c=document.getElementById('q-opts');c.innerHTML='';
  opts.forEach(o=>{
    if(type==='ko-en'){
      const row=document.createElement('div');
      row.className='opt-row';
      const btn=document.createElement('button');
      btn.className='opt';
      btn.dataset.val=o;
      btn.style.cssText='display:flex;justify-content:space-between;align-items:center;gap:.5em';
      const ow=qOptWordsMap[o];
      const koText=ow?ow.ko[0]:'';
      const enSpan=document.createElement('span');enSpan.textContent=o;
      btn.appendChild(enSpan);
      if(koText){
        const koSpan=document.createElement('span');
        koSpan.className='opt-ko-reveal';
        koSpan.textContent=koText;
        koSpan.style.cssText='color:var(--muted);font-size:.8em;font-weight:400;white-space:nowrap;display:none';
        btn.appendChild(koSpan);
      }
      btn.onclick=()=>pick(o,correct,word);
      const tts=document.createElement('button');
      tts.className='tts';tts.textContent='🔊';tts.title='발음 듣기';
      tts.onclick=()=>speak(o);
      row.appendChild(btn);row.appendChild(tts);
      c.appendChild(row);
    }else{
      const btn=document.createElement('button');
      btn.className='opt';
      btn.dataset.val=o;
      btn.style.cssText='display:flex;justify-content:space-between;align-items:center;gap:.5em';
      const koSpan=document.createElement('span');koSpan.textContent=o;
      btn.appendChild(koSpan);
      const ow=qOptWordsMap[o];
      const revealWrap=document.createElement('span');
      revealWrap.className='opt-en-reveal';
      revealWrap.style.cssText='display:none;align-items:center;gap:.25em';
      const enSpan=document.createElement('span');
      enSpan.textContent=ow?ow.en:'';
      enSpan.style.cssText='color:var(--muted);font-weight:400;white-space:nowrap';
      revealWrap.appendChild(enSpan);
      if(ow&&ow.en){
        const ttsSpan=document.createElement('span');
        ttsSpan.textContent='🔊';
        ttsSpan.style.cssText='cursor:pointer;font-size:.85em;color:var(--muted);padding:0 .1em';
        ttsSpan.onclick=(e)=>{e.stopPropagation();speak(ow.en);};
        revealWrap.appendChild(ttsSpan);
      }
      btn.appendChild(revealWrap);
      btn.onclick=()=>pick(o,correct,word);
      c.appendChild(btn);
    }
  });
}
function pick(sel,correct,word){
  const ok=sel===correct;
  if(ok){
    qScore++;
    if(isWrongQuizMode){
      const hk=word.en;
      if(!allHistory.has(hk))allHistory.set(hk,{word,wrongs:0,corrects:0});
      allHistory.get(hk).corrects++;
    }
  }else{
    const k=word.en;
    if(wrongMap.has(k))wrongMap.get(k).count++;
    else wrongMap.set(k,{word,count:1});
    if(allWrong.has(k))allWrong.get(k).count++;
    else allWrong.set(k,{word,count:1});
    if(!allHistory.has(k))allHistory.set(k,{word,wrongs:0,corrects:0});
    allHistory.get(k).wrongs++;
    updateHomeWrongBtn();dbSave();
  }
  document.querySelectorAll('.opt').forEach(b=>{
    b.disabled=true;
    const v=b.dataset.val??b.textContent;
    if(v===correct)b.classList.add('ok');
    else if(v===sel&&!ok)b.classList.add('bad');
  });
  const qType=qQuestions[qIdx].type;
  const mr=document.getElementById('q-meaning-reveal');
  if(qType==='en-ko'){

}

function goWrongQuiz(){

}
function startWrongQuiz(mode){

function goWrongStudy(){

}
function goWrongFromHome(){

}
function goWrongBack(){

  else showSc('result');
}
function clearAllWrong(){
  if(!confirm('오답 목록을 초기화할까요?'))return;
  allWrong=new Map();
  updateHomeWrongBtn();
  dbSave();
  goHome();
}
function updateHomeWrongBtn(){}
function checkTyped(){
  const q=qQuestions[qIdx];const w=q.word;
  const typed=document.getElementById('q-type-input').value.trim();
  if(!typed)return;
  const ok=w.ko.some(k=>k.trim()===typed||k.includes(typed)||typed.includes(k.trim()));
  document.getElementById('q-type-input').disabled=true;
  if(ok){
    qScore++;
    if(isWrongQuizMode){
      const hk=w.en;
      if(!allHistory.has(hk))allHistory.set(hk,{word:w,wrongs:0,corrects:0});
      allHistory.get(hk).corrects++;
    }
  }else{
    const key=w.en;
    if(wrongMap.has(key))wrongMap.get(key).count++;
    else wrongMap.set(key,{word:w,count:1});
    if(allWrong.has(key))allWrong.get(key).count++;
    else allWrong.set(key,{word:w,count:1});
    if(!allHistory.has(key))allHistory.set(key,{word:w,wrongs:0,corrects:0});
    allHistory.get(key).wrongs++;
    updateHomeWrongBtn();dbSave();
  }
  const mr=document.getElementById('q-meaning-reveal');
  const expl=document.getElementById('q-expl');
  expl.classList.add('show');
  const answerLine=ok?'':
    `<div style="margin-bottom:.375em;font-size:.88em">정답: <span style="font-weight:700;color:var(--success)">${w.ko.join(' / ')}</span></div>`;
  document.getElementById('q-expl-body').innerHTML=
    `<span style="font-weight:700;color:${ok?'var(--success)':'var(--danger)'};display:block;margin-bottom:.375em">${ok?'✓ 정답!':'✗ 오답'}</span>${answerLine}${etymHTML(w.en)}`;
  document.getElementById('q-next').style.display='flex';
}
function passTyped(){
  const q=qQuestions[qIdx];const w=q.word;
  document.getElementById('q-type-input').disabled=true;
  const key=w.en;
  if(wrongMap.has(key))wrongMap.get(key).count++;
  else wrongMap.set(key,{word:w,count:1});
  if(allWrong.has(key))allWrong.get(key).count++;
  else allWrong.set(key,{word:w,count:1});
  if(!allHistory.has(key))allHistory.set(key,{word:w,wrongs:0,corrects:0});
  allHistory.get(key).wrongs++;
  updateHomeWrongBtn();dbSave();
  const mr=document.getElementById('q-meaning-reveal');
  document.getElementById('q-expl').classList.add('show');
  document.getElementById('q-expl-body').innerHTML=
    `<span style="font-weight:700;color:var(--muted);display:block;margin-bottom:.375em">⏭ 패스 (오답 처리)</span><div style="margin-bottom:6px;font-size:.9em">정답: <span style="font-weight:700;color:var(--success)">${w.ko.join(' / ')}</span></div>${etymHTML(w.en)}`;
  document.getElementById('q-next').style.display='flex';
}

// ── HISTORY TRACKER ──
function clearHistory(){
  if(!confirm('회독 체크 기록을 모두 초기화할까요?'))return;
  allHistory=new Map();
  dbSave();
  goHistory();
}
function goHistory(){
  const list=document.getElementById('history-list');
  list.innerHTML='';
  if(allHistory.size===0){
    list.innerHTML='<div style="text-align:center;color:var(--muted);padding:2em;font-size:.9em">아직 오답 기록이 없습니다.<br>퀴즈를 풀면 이곳에 기록됩니다.</div>';
    showSc('history');return;
  }
  const sorted=[...allHistory.values()].sort((a,b)=>b.wrongs-a.wrongs);
  sorted.forEach(({word,wrongs,corrects})=>{
    const total=Math.min(wrongs+corrects,20);
    let boxes='';
    for(let i=0;i<20;i++){
      if(i<Math.min(wrongs,20)){
        boxes+=`<span style="display:inline-flex;align-items:center;justify-content:center;width:1em;height:1em;border-radius:.2em;background:var(--danger);color:#fff;font-size:.78em;font-weight:700;flex-shrink:0">✗</span>`;
      }else if(i<Math.min(wrongs+corrects,20)){
        boxes+=`<span style="display:inline-flex;align-items:center;justify-content:center;width:1em;height:1em;border-radius:.2em;background:var(--success);color:#fff;font-size:.78em;font-weight:700;flex-shrink:0">✓</span>`;
      }else{
        boxes+=`<span style="display:inline-flex;width:1em;height:1em;border-radius:.2em;background:var(--border);flex-shrink:0"></span>`;
      }
    }
    const div=document.createElement('div');
    div.style.cssText='background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:.75em 1em;margin-bottom:.5em;display:flex;justify-content:space-between;align-items:center;gap:.75em';
    div.innerHTML=`<div style="min-width:0;flex:1"><div style="font-weight:700;font-size:.93em">${word.en}</div><div style="color:var(--muted);font-size:.78em;margin-top:.1em">${word.ko.slice(0,2).join(' / ')}</div></div><div style="display:flex;gap:.15em;flex-wrap:nowrap;flex-shrink:0;overflow-x:auto">${boxes}</div>`;
    list.appendChild(div);
  });
  showSc('history');
}

// ── ETYMOLOGY BROWSER ──
function goEtymBrowse(){
  // Collect all dataset words into a lookup map
  const allWords=new Map();
  SECTIONS.forEach(sec=>{
    sec.words.forEach(w=>{
      const k=w.en.toLowerCase().trim();
      if(!allWords.has(k))allWords.set(k,{en:w.en,ko:w.ko});
    });
  });
  // Build root-family map: root-key → {p, m, words[]}
  const rootMap=new Map();
  Object.entries(ETYM).forEach(([enLow,etym])=>{
    const wd=allWords.get(enLow)||{en:enLow,ko:ETYM_FALLBACK_KO[enLow]||[]};
    etym.r.forEach(rt=>{
      const key=rt.p+'||'+rt.m;
      if(!rootMap.has(key))rootMap.set(key,{p:rt.p,m:rt.m,words:[]});
      const grp=rootMap.get(key);
      if(!grp.words.find(w=>w.en.toLowerCase()===enLow))
        grp.words.push({en:wd.en||enLow,ko:wd.ko||[]});
    });
  });
  // Only groups with 2+ words, sorted by size descending
  const groups=[...rootMap.values()]
    .filter(g=>g.words.length>=2)
    .sort((a,b)=>b.words.length-a.words.length);
  const list=document.getElementById('etym-browse-list');
  list.innerHTML='';
  if(!groups.length){list.innerHTML='<p style="color:var(--muted);text-align:center">어원 데이터가 없습니다.</p>';showSc('etym-browse');return;}
  groups.forEach(g=>{
    const div=document.createElement('div');
    div.className='etym-group';
    const wordItems=g.words.map((w,idx)=>{
      const etym=ETYM[w.en.toLowerCase()];
      const enEsc=w.en.replace(/'/g,"\\'");
      const isLast=idx===g.words.length-1;
      let detailHTML='';
      if(etym){
        const roots=etym.r.map((r,i)=>(i>0?' + ':'')+`<b style="color:var(--primary)">${r.p}</b><span style="color:var(--muted)">(${r.m})</span>`).join('');
        detailHTML=`<div style="display:none;padding:.4em .6em;margin-bottom:.3em;font-size:.8em;background:var(--primary-light);border-radius:.4em;line-height:1.7;border-left:.2em solid var(--border)">
          <div style="margin-bottom:.25em">${roots}</div>
          <div style="color:var(--muted);font-style:italic">${etym.t}</div>
        </div>`;
      }
      const toggleBtn=etym?`<button onclick="var d=this.parentElement.nextElementSibling;var open=d.style.display!='none';d.style.display=open?'none':'';this.textContent=open?'펼치기':'접기'" style="font-size:.72em;padding:.12em .45em;border-radius:.35em;border:1px solid var(--border);background:none;cursor:pointer;color:var(--muted);margin-left:auto;white-space:nowrap;flex-shrink:0">펼치기</button>`:'';
      return`<div style="border-bottom:${isLast?'none':'1px solid var(--border)'}">
        <div style="display:flex;align-items:center;gap:.4em;padding:.35em 0">
          <span class="etym-en">${w.en}</span>
          <button class="tts" onclick="event.stopPropagation();speak('${enEsc}')" style="font-size:.72em;padding:1px 4px;flex-shrink:0">🔊</button>
          <span class="etym-ko">${w.ko.slice(0,1).join('')}</span>
          ${toggleBtn}
        </div>
        ${detailHTML}
      </div>`;
    }).join('');
    div.innerHTML=`<div class="etym-group-hd">
      <span class="etym-root-badge">${g.p}</span>
      <span class="etym-root-meaning">"${g.m}"</span>
      <span style="margin-left:auto;font-size:.75em;color:var(--muted)">${g.words.length}개</span>
    </div>
    <div>${wordItems}</div>`;
    list.appendChild(div);
  });
  showSc('etym-browse');
}

// ── FAVORITES ──
function saveFavorites(){localStorage.setItem('vocabit-fav',JSON.stringify([...favorites]));}
function toggleFavorite(en){
  const k=en.toLowerCase();
  if(favorites.has(k))favorites.delete(k);
  else favorites.add(k);
  saveFavorites();updateFavBtn();updateHomeFavBtn();dbSaveFavNow();
}
function updateFavBtn(){
  const w=stWords[stIdx];if(!w)return;
  const active=favorites.has(w.en.toLowerCase());
  const btn=document.getElementById('fav-btn');
  if(btn){btn.textContent=active?'⭐':'☆';btn.classList.toggle('active',active);}
  const ob=document.getElementById('fc-ov-fav');
  if(ob){ob.textContent=active?'⭐':'☆';ob.classList.toggle('active',active);}
}
function updateHomeFavBtn(){
  const btn=document.getElementById('home-fav-btn');if(!btn)return;
  const cnt=favorites.size;
  btn.textContent=cnt?`⭐ 즐겨찾기 (${cnt})`:'⭐ 즐겨찾기';
}
function getFavWords(){
  const all=new Map();
  SECTIONS.forEach(sec=>{
    sec.words.forEach(w=>{
      const k=w.en.toLowerCase().trim();
      if(!favorites.has(k))return;
      if(!all.has(k)){all.set(k,{en:w.en,ko:[...w.ko],secs:[sec.name]});}
      else{const ex=all.get(k);w.ko.forEach(m=>{if(!ex.ko.includes(m))ex.ko.push(m);});if(!ex.secs.includes(sec.name))ex.secs.push(sec.name);}
    });
  });
  return[...all.values()];
}
function goFavorites(){
  renderFavPage();showSc('favorites');
}
function renderFavPage(){
  const words=getFavWords();
  const empty=document.getElementById('fav-empty');
  const main=document.getElementById('fav-main');
  if(!words.length){empty.style.display='block';main.style.display='none';return;}
  empty.style.display='none';main.style.display='block';
  document.getElementById('fav-count-bar').textContent=`즐겨찾기 ${words.length}개`;
  // Count buttons
  const countBtns=document.getElementById('fav-count-btns');
  countBtns.innerHTML='';
  const options=[{label:'전체',val:0}];
  if(words.length>=50)options.push({label:'50개',val:50});
  if(words.length>=100)options.push({label:'100개',val:100});
  options.forEach(opt=>{
    const btn=document.createElement('button');
    btn.className='btn '+(favCount===opt.val?'btn-sel btn-p':'btn-s');
    btn.style.cssText='min-width:4em';
    btn.textContent=opt.label;
    btn.onclick=()=>{favCount=opt.val;renderFavPage();};
    countBtns.appendChild(btn);
  });
  // Mode buttons
  document.querySelectorAll('.fav-mode-btn').forEach(b=>{
    const sel=b.dataset.mode===favMode;
    b.className='btn fav-mode-btn '+(sel?'btn-sel btn-p':'btn-s');
  });
  // Word list
  const list=document.getElementById('fav-list');
  list.innerHTML='';
  words.forEach(w=>{
    const k=w.en.toLowerCase();
    const div=document.createElement('div');
    div.className='fav-word-row';
    const rmBtn=document.createElement('button');
    rmBtn.className='fav-star active';rmBtn.textContent='⭐';rmBtn.title='즐겨찾기 해제';
    rmBtn.onclick=()=>{favorites.delete(k);saveFavorites();updateHomeFavBtn();renderFavPage();};
    const info=document.createElement('div');
    info.style.cssText='flex:1;min-width:0';
    info.innerHTML=`<div style="font-weight:700;font-size:.93em">${w.en}</div><div style="color:var(--muted);font-size:.8em;margin-top:.1em">${w.ko.join(' / ')}</div>`;
    const ttsBtn=document.createElement('button');
    ttsBtn.className='tts';ttsBtn.textContent='🔊';ttsBtn.style.cssText='font-size:.85em';
    ttsBtn.onclick=()=>speak(w.en);
    div.appendChild(rmBtn);div.appendChild(info);div.appendChild(ttsBtn);
    list.appendChild(div);
  });
}
function setFavMode(mode){
  favMode=mode;
  document.querySelectorAll('.fav-mode-btn').forEach(b=>{
    const sel=b.dataset.mode===mode;
    b.className='btn fav-mode-btn '+(sel?'btn-sel btn-p':'btn-s');
  });
}
function startFavQuiz(){
  let words=getFavWords();
  if(words.length<2){alert('즐겨찾기 단어가 2개 이상 필요합니다.');return;}
  if(favCount>0&&words.length>favCount)words=shuffle(words).slice(0,favCount);
  isWrongQuizMode=false;
  qMode=favMode;qScore=0;qIdx=0;wrongMap=new Map();
  merged=words;
  qQuestions=buildQuestions(words,favMode);
  showSc('quiz');renderQ();
}
function goFavStudy(){
  let words=getFavWords();
  if(!words.length){alert('즐겨찾기 단어가 없습니다.');return;}
  if(favCount>0&&words.length>favCount)words=shuffle(words).slice(0,favCount);
  stWords=words;stIdx=0;showSc('study');renderSt();
}

// ── TTS ──
function speak(t){
  if(!window.speechSynthesis)return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(t);
  u.lang='en-US';u.rate=0.88;
  speechSynthesis.speak(u);
}
