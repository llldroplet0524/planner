<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>업무 플래너</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#0f0f13;--bg2:#16161d;--bg3:#1e1e28;--border:#2e2e3e;--border2:#3a3a4e;--text:#e8e8f0;--text2:#9090a8;--text3:#5a5a72;--accent:#7c6af7;--accent2:#a594fa;--accent-bg:rgba(124,106,247,0.12);--green:#4ade80;--green-bg:rgba(74,222,128,0.12);--amber:#fbbf24;--amber-bg:rgba(251,191,36,0.12);--red:#f87171;--red-bg:rgba(248,113,113,0.12);--blue:#60a5fa;--blue-bg:rgba(96,165,250,0.12);--teal:#2dd4bf;--teal-bg:rgba(45,212,191,0.12);--pink:#f472b6;--pink-bg:rgba(244,114,182,0.12);--mono:'DM Mono',monospace;--sans:'Noto Sans KR',sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{overflow-x:hidden;max-width:100vw;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14.5px;min-height:100vh;display:flex;flex-direction:column;}
.header{display:flex;align-items:center;justify-content:space-between;padding:0.7em 1.4em;border-bottom:1px solid var(--border);background:var(--bg2);position:sticky;top:0;z-index:100;gap:0.6em;flex-wrap:wrap;}
.htitle{font-size:1.5em;font-weight:700;letter-spacing:-0.3px;}
.htitle span{color:var(--accent2);}
.hcenter{display:flex;align-items:center;gap:10px;}
.hcenter button{background:none;border:1px solid var(--border2);color:var(--text2);padding:0.35em 0.85em;border-radius:6px;cursor:pointer;font-size:0.85em;transition:all 0.15s;}
.hcenter button:hover{border-color:var(--accent);color:var(--accent2);}
.mlabel{font-weight:500;color:var(--text);min-width:5em;text-align:center;font-size:1em;}
.ss{font-size:0.75em;font-family:var(--mono);padding:0.25em 0.6em;border-radius:99px;}
.ss.ok{background:var(--green-bg);color:var(--green);}
.ss.loading{background:var(--amber-bg);color:var(--amber);}
.ss.error{background:var(--red-bg);color:var(--red);}
.layout{display:grid;grid-template-columns:18% minmax(0,56%) 26%;flex:1;height:calc(100vh - 3.2em);max-width:1600px;margin:0 auto;width:100%;}
.panel{border-right:1px solid var(--border);padding:1.2em;overflow-y:auto;min-width:0;overflow-x:hidden;}
.panel:last-child{border-right:none;}
.ptitle{font-size:0.95em;font-weight:500;letter-spacing:0.04em;color:var(--text2);margin-bottom:1em;padding-bottom:0.7em;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.sbox{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:0.85em 1em;margin-bottom:1em;}
.srow{display:flex;justify-content:space-between;font-size:0.85em;color:var(--text2);margin-bottom:0.3em;}
.srow:last-child{margin-bottom:0;}
.sval{font-family:var(--mono);font-size:0.92em;}
.sval.done{color:var(--green);}
.sval.pend{color:var(--amber);}
.dlabel{font-size:0.78em;color:var(--text3);font-family:var(--mono);margin:0.85em 0 0.4em;display:flex;align-items:center;gap:5px;}
.dlabel::after{content:'';flex:1;height:1px;background:var(--border);}
.titem{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:0.7em 0.85em;margin-bottom:0.4em;cursor:pointer;transition:all 0.15s;position:relative;}
.titem:hover{border-color:var(--border2);}
.titem.done{opacity:0.45;}
.ttop{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:2px;padding-right:52px;}
.tname{font-size:0.85em;font-weight:500;}
.tamt{font-family:var(--mono);font-size:0.85em;color:var(--amber);}
.titem.done .tamt{color:var(--text3);}
.tbank{font-size:0.78em;color:var(--text3);}
.tactions{position:absolute;right:8px;top:50%;transform:translateY(-50%);display:flex;align-items:center;gap:4px;}
.chkbtn{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--border2);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;flex-shrink:0;}
.chkbtn:hover{border-color:var(--green);}
.chkbtn.checked{background:var(--green);border-color:var(--green);}
.chkbtn.checked::after{content:'';width:9px;height:6px;border-left:2px solid #0f0f13;border-bottom:2px solid #0f0f13;transform:rotate(-45deg) translateY(-1px);display:block;}
.icobtn{width:1.3em;height:1.3em;border-radius:5px;border:1px solid var(--border);background:none;cursor:pointer;font-size:0.78em;display:flex;align-items:center;justify-content:center;color:var(--text3);transition:all 0.15s;}
.icobtn:hover{border-color:var(--border2);color:var(--text2);}
.icobtn.del:hover{border-color:var(--red);color:var(--red);}
.addbtn{width:100%;padding:0.55em;background:none;border:1px dashed var(--border2);border-radius:8px;color:var(--text3);font-size:0.78em;cursor:pointer;transition:all 0.15s;margin-top:0.7em;font-family:var(--sans);}
.addbtn:hover{border-color:var(--accent);color:var(--accent2);}
.addbtn-sm{width:auto;padding:0.4em 0.85em;margin:0;border-style:solid;font-size:0.78em;border-radius:6px;}
.cal-panel{padding:1.3em 1em;}
.cgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cdow{text-align:center;font-size:0.85em;color:var(--text3);padding:0.45em 0;font-weight:500;}
.cdow.sun{color:var(--red);}
.cdow.sat{color:var(--blue);}
.cday{height:14em;max-height:14em;overflow:hidden;background:var(--bg2);border:1px solid var(--border);border-radius:7px;padding:0.45em;cursor:pointer;transition:all 0.15s;display:flex;flex-direction:column;}
.cday:hover{border-color:var(--border2);background:var(--bg3);}
.cday.sel{border-color:var(--accent);border-width:2px;background:var(--accent-bg);}
.cday.today{border-color:rgba(255,255,255,0.6);}
.cday.today .dnum{font-size:0.9em;color:var(--accent2);font-weight:700;}
.cday.empty{background:none;border-color:transparent;cursor:default;}
.cday.sun .dnum{color:var(--red);}
.cday.sat .dnum{color:var(--blue);}
.dnum{font-size:12.5px;font-weight:500;color:var(--text2);margin-bottom:3px;font-family:var(--mono);}
.chips{display:flex;flex-direction:column;gap:2px;overflow:hidden;flex:1;}
.cday.drag-over{border-color:var(--accent) !important;border-width:2px !important;background:var(--accent-bg) !important;box-shadow:0 0 0 2px var(--accent);}
.chip{font-size:0.72em;padding:0.18em 0.35em;border-radius:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;display:flex;align-items:center;gap:3px;cursor:grab;}
.chip-text{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0;}
.chip.상시{background:var(--blue-bg);color:var(--blue);font-weight:500;}
.chip.월간{background:var(--accent-bg);color:var(--accent2);font-weight:500;}
.chip.분기{background:var(--teal-bg);color:var(--teal);font-weight:500;}
.chip.반기{background:var(--pink-bg);color:var(--pink);font-weight:500;}
.chip.연간{background:var(--red-bg);color:var(--red);font-weight:500;}
.chip.tr{background:rgba(251,191,36,0.25);color:#f59e0b;}
.chip.tr.done{background:var(--amber-bg);color:rgba(251,191,36,0.45);}
.chip.sub{opacity:0.8;cursor:pointer;}
.chip.task-done{background:var(--bg3)!important;color:var(--text2)!important;opacity:0.75;font-weight:400;}
.dpanel{background:var(--bg2);}
.dempty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:200px;color:var(--text3);font-size:1em;gap:8px;}
.ddate{font-family:var(--mono);font-size:1.3em;font-weight:500;color:var(--text);margin-bottom:1.1em;}
.dsec{margin-bottom:18px;}
.dstitle{font-size:0.85em;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:0.55em;font-weight:500;}
.ditem{background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:0.9em 1em;margin-bottom:0;position:relative;box-shadow:0 2px 8px rgba(0,0,0,0.25);}
.ditem-actions{position:absolute;top:0.7em;right:0.7em;display:flex;gap:0.3em;z-index:1;}
.diname{font-size:1em;font-weight:500;margin-bottom:8px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;padding-right:56px;}
.badge{display:inline-block;font-size:0.78em;padding:0.15em 0.55em;border-radius:99px;font-weight:500;}
.badge.green{background:var(--green-bg);color:var(--green);}
.badge.amber{background:var(--amber-bg);color:var(--amber);}
.badge.blue{background:var(--blue-bg);color:var(--blue);}
.badge.red{background:var(--red-bg);color:var(--red);}
.badge.purple{background:var(--accent-bg);color:var(--accent2);}
.badge.teal{background:var(--teal-bg);color:var(--teal);}
.badge.pink{background:var(--pink-bg);color:var(--pink);}
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:8px;}
.mi{font-size:0.85em;color:var(--text3);}
.mi span{color:var(--text2);}
.plabel{display:flex;justify-content:space-between;font-size:0.78em;color:var(--text3);margin-bottom:4px;}
.plabel span{color:var(--accent2);font-family:var(--mono);}
.pbg{background:var(--border);border-radius:99px;height:5px;overflow:hidden;margin-bottom:10px;}
.pfill{height:100%;border-radius:99px;background:var(--accent);transition:width 0.4s;}
.stlist{margin-bottom:8px;}
.stitem{display:flex;align-items:center;gap:8px;padding:0.55em 0;border-bottom:1px solid var(--border);}
.stitem:last-child{border-bottom:none;}
.stdate{font-size:0.75em;color:var(--accent2);font-family:var(--mono);white-space:nowrap;flex-shrink:0;}
.stdate.overdue{color:var(--red);}
.stdate.today{color:var(--green);}
.stchk{width:1.3em;height:1.3em;border-radius:4px;border:1.5px solid var(--border2);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.15s;}
.stchk:hover{border-color:var(--green);}
.stchk.checked{background:var(--green);border-color:var(--green);}
.stchk.checked::after{content:'';width:7px;height:4px;border-left:1.5px solid #0f0f13;border-bottom:1.5px solid #0f0f13;transform:rotate(-45deg) translateY(-1px);display:block;}
.stname{flex:1;font-size:0.85em;color:var(--text2);}
.stname.done{text-decoration:line-through;color:var(--text3);}
.stadd{display:flex;gap:6px;margin-top:6px;align-items:center;flex-wrap:nowrap;}
.stadd input[type=text],.stadd input:not([type=date]){flex:1;min-width:0;}
.stadd input[type=date]{width:0;height:0;opacity:0;position:absolute;pointer-events:none;}
.stadd .date-pick-btn{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:0.4em 0.6em;color:var(--text2);font-size:0.78em;cursor:pointer;white-space:nowrap;flex-shrink:0;}
.stadd .date-pick-btn:hover{border-color:var(--accent);color:var(--accent2);}
.stadd button.add-btn{background:var(--accent-bg);border:1px solid var(--accent);color:var(--accent2);padding:0.4em 0.75em;border-radius:6px;cursor:pointer;font-size:0.78em;font-family:var(--sans);white-space:nowrap;flex-shrink:0;}
.stadd input[type=text],.stadd input:not([type=date]):not([type=button]){flex:1;min-width:0;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:0.4em 0.6em;color:var(--text);font-size:0.78em;font-family:var(--sans);outline:none;}
.stadd input:not([type=date]):focus{border-color:var(--accent);}
.jlist{margin-bottom:10px;}
.jitem{display:flex;gap:8px;padding:0.6em 0;border-bottom:1px solid var(--border);position:relative;}
.jitem:last-child{border-bottom:none;}
.jdate{font-size:0.78em;color:var(--accent2);font-family:var(--mono);white-space:nowrap;margin-top:2px;min-width:4em;}
.jtext{font-size:0.85em;color:var(--text2);line-height:1.6;flex:1;padding-right:40px;}
.jacts{position:absolute;right:0;top:8px;display:flex;gap:3px;}
.jadd{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:0.75em;margin-top:6px;}
.jadd-row{display:flex;gap:6px;margin-bottom:6px;}
.jadd input[type=date]{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:0.5em 0.7em;color:var(--text);font-size:0.78em;font-family:var(--mono);outline:none;}
.jadd input[type=date]:focus{border-color:var(--accent);}
.jadd textarea{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:0.65em;color:var(--text);font-size:0.78em;font-family:var(--sans);outline:none;resize:none;height:5.5em;line-height:1.6;margin-bottom:0.5em;}
.jadd textarea:focus{border-color:var(--accent);}
.jadd button{background:var(--accent);border:none;color:#fff;padding:0.4em 0.85em;border-radius:6px;cursor:pointer;font-size:0.78em;font-family:var(--sans);float:right;}
.imgrid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px;}
.imgcard{border-radius:6px;overflow:hidden;border:1px solid var(--border);cursor:pointer;}
.imgcard img{width:100%;height:90px;object-fit:cover;display:block;}
.imgcap{font-size:0.85em;color:var(--text3);padding:0.38em 0.55em;background:var(--bg3);}
.upzone{border:1px dashed var(--border2);border-radius:8px;padding:0.55em;text-align:center;cursor:pointer;transition:all 0.15s;margin-top:0.6em;}
.upzone:hover{border-color:var(--accent);}
.upzone input{display:none;}
.upzone-t{font-size:0.78em;color:var(--text3);}
.upzone-t span{color:var(--accent2);}
/* transfer history */
.thist{margin-top:8px;}
.thist-title{font-size:0.85em;color:var(--text3);letter-spacing:0.04em;margin-bottom:0.4em;}
.thist-item{display:flex;gap:8px;font-size:0.92em;color:var(--text2);padding:0.3em 0;border-bottom:1px solid var(--border);}
.thist-item:last-child{border-bottom:none;}
.thist-date{font-family:var(--mono);font-size:0.85em;color:var(--text3);min-width:52px;}
/* lightbox */
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:500;align-items:center;justify-content:center;flex-direction:column;gap:14px;}
.lightbox.open{display:flex;}
.lightbox img{max-width:88vw;max-height:72vh;border-radius:10px;object-fit:contain;}
.lbcap{font-size:1.1em;color:var(--text2);max-width:600px;text-align:center;}
.lbclose{position:absolute;top:20px;right:24px;background:none;border:1px solid var(--border2);color:var(--text2);padding:0.45em 1em;border-radius:6px;cursor:pointer;font-size:1em;}
/* mini cal */
.dfwrap{position:relative;}
.dirow{display:flex;gap:6px;}
.dirow input{flex:1;}
.caltbtn{background:var(--bg3);border:1px solid var(--border);color:var(--text2);padding:0.55em 0.85em;border-radius:7px;cursor:pointer;font-size:0.85em;}
.minical{position:absolute;top:100%;left:0;z-index:400;background:var(--bg2);border:1px solid var(--border2);border-radius:0.7em;padding:1em;width:18em;margin-top:0.3em;box-shadow:0 8px 32px rgba(0,0,0,0.5);}
.mch{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.mch button{background:none;border:none;color:var(--text2);cursor:pointer;font-size:1em;padding:0.15em 0.55em;border-radius:4px;}
.mch button:hover{color:var(--text);background:var(--bg3);}
.mclabel{font-size:0.85em;font-weight:500;color:var(--text);}
.mcgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.mcdow{text-align:center;font-size:0.72em;color:var(--text3);padding:0.2em 0;}
.mcday{text-align:center;font-size:0.85em;padding:0.35em 0.15em;border-radius:5px;cursor:pointer;color:var(--text2);transition:all 0.1s;}
.mcday:hover{background:var(--bg3);color:var(--text);}
.mcday.msel{background:var(--accent);color:#fff;}
.mcday.mtod{color:var(--accent2);font-weight:700;}
.mcday.memp{cursor:default;color:transparent;}
/* modal */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:300;align-items:center;justify-content:center;}
.overlay.open{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:1em;padding:1.7em;width:33em;max-width:92vw;max-height:90vh;overflow-y:auto;}
.mtitle{font-size:1.1em;font-weight:700;margin-bottom:1.3em;}
.fg{margin-bottom:0.85em;}
.fl{font-size:0.78em;color:var(--text3);margin-bottom:0.35em;display:block;text-transform:uppercase;letter-spacing:0.06em;}
.fi{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:0.5em;padding:0.55em 0.85em;color:var(--text);font-size:0.85em;font-family:var(--sans);outline:none;transition:border-color 0.15s;}
.fi:focus{border-color:var(--accent);}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.macts{display:flex;gap:0.55em;margin-top:1.3em;justify-content:flex-end;}
.btn{padding:0.4em 1.1em;border-radius:0.5em;font-size:0.78em;font-family:var(--sans);cursor:pointer;border:none;transition:all 0.15s;}
.bcnl{background:var(--bg3);color:var(--text2);border:1px solid var(--border);}
.bcnl:hover{border-color:var(--border2);background:var(--bg2);}
.bpri{background:var(--accent-bg);color:var(--accent2);border:1px solid var(--accent);}
.bpri:hover{background:var(--accent);color:#fff;}
.bdel{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bg);}
.bdel:hover{background:var(--red);color:#fff;}
::-webkit-scrollbar{width:4px;}
@media (max-width:1100px){
  .layout{grid-template-columns:20% 1fr 28%;}
  .panel{padding:0.85em;}
}
@media (max-width:800px){
  body{overflow-y:auto;}
  .layout{grid-template-columns:1fr !important;height:auto !important;overflow:visible;}
  .panel{height:auto !important;min-height:280px;border-right:none;border-bottom:1px solid var(--border);overflow:visible;}
  .cal-panel{padding:14px 10px;}
  .dpanel{min-height:400px;}
}
@media (max-width:500px){
  .header{padding:10px 14px;}
  .htitle{font-size:15.5px;}
  .mlabel{font-size:13.5px;min-width:80px;}
  .layout{font-size:13.5px;}
  .cday{min-height:58px;padding:4px;}
  .dnum{font-size:11.5px;}
  .chip{font-size:8px;}
  .holiday-label{font-size:0.65em;color:var(--red);line-height:1.2;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
}
.nitem{display:flex;align-items:flex-start;gap:8px;padding:0.35em 0;border-bottom:1px solid var(--border);position:relative;}
.nitem:last-child{border-bottom:none;}
.narrow{font-size:0.92em;color:var(--text3);cursor:pointer;user-select:none;width:1.2em;flex-shrink:0;margin-top:2px;}
.nbody{flex:1;min-width:0;}
.ntitle-row{display:flex;align-items:center;gap:6px;}
.ntitle{font-size:0.85em;color:var(--text);cursor:pointer;flex:1;line-height:1.5;}
.ntitle:hover{color:var(--accent2);}
.nacts{display:flex;gap:3px;opacity:0;transition:opacity 0.15s;flex-shrink:0;}
.nitem:hover .nacts{opacity:1;}
.nmemo{font-size:0.78em;color:var(--text3);margin-top:0.45em;line-height:1.6;word-break:break-word;background:var(--bg3);border-radius:6px;padding:0.55em 0.7em;border-left:2px solid var(--border2);}
.nmemo ol{margin:0;padding-left:1.4em;}
.nmemo ul{margin:0;padding-left:1.4em;}
.nmemo li{margin-bottom:0.2em;}
.nmemo p{margin:0 0 0.3em;}
.nchildren{padding-left:20px;border-left:1px dashed var(--border2);margin-top:4px;}
.ntoggle{font-size:0.78em;color:var(--text3);cursor:pointer;padding:0.08em 0.38em;border:1px solid var(--border);border-radius:4px;flex-shrink:0;}
.ntoggle:hover{border-color:var(--border2);color:var(--text2);}
[id^="drop-"]{min-height:60px;border-radius:8px;transition:background 0.15s;}
[id^="drop-"]:hover{background:var(--accent-bg);}
#nm-memo:empty:before{content:attr(placeholder);color:var(--text3);pointer-events:none;}
.toast{position:fixed;bottom:1.7em;left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--border2);color:var(--text);padding:0.7em 1.4em;border-radius:0.55em;font-size:0.85em;font-family:var(--sans);z-index:9999;opacity:0;transition:opacity 0.2s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}
.holiday-label{font-size:0.65em;color:var(--red);line-height:1.2;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tmpl-tab{background:var(--bg3);border:1px solid var(--border);color:var(--text2);padding:0.35em 0.9em;border-radius:6px;cursor:pointer;font-size:0.8em;font-family:var(--sans);transition:all 0.15s;}
.tmpl-tab:hover{border-color:var(--accent);color:var(--accent2);}
.tmpl-tab.active{background:var(--accent-bg);border-color:var(--accent);color:var(--accent2);font-weight:500;}
.tmpl-item{padding:0.7em 1em;border-bottom:1px solid var(--border);cursor:pointer;display:flex;align-items:center;gap:8px;transition:background 0.1s;}
.tmpl-item:hover{background:var(--bg3);}
.tmpl-item.active{background:var(--accent-bg);}
.tmpl-item:last-child{border-bottom:none;}
.tmpl-sub-row{display:flex;align-items:center;gap:8px;padding:0.5em 0;border-bottom:1px solid var(--border);transition:background 0.1s;}
.tmpl-sub-row:last-child{border-bottom:none;}
.tmpl-sub-row.drag-over{background:var(--accent-bg);border-radius:6px;}
.tmpl-sub-row.dragging{opacity:0.3;}
.tmpl-drag-handle{color:var(--text3);cursor:grab;font-size:1.1em;flex-shrink:0;padding:0 2px;user-select:none;line-height:1;}
.tmpl-drag-handle:active{cursor:grabbing;}
.memo-card{background:var(--bg2);border:1px solid var(--border2);border-radius:10px;padding:14px 16px;cursor:pointer;transition:border-color 0.15s,transform 0.1s;display:flex;flex-direction:column;gap:7px;}
.memo-card:hover{border-color:var(--accent);transform:translateY(-1px);}
.memo-card.dragging{opacity:0.3;}
.memo-card.memo-card-selected{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-bg);}
.memo-card.card-drag-over-top{border-top:2px solid var(--accent);}
.memo-card.card-drag-over-bottom{border-bottom:2px solid var(--accent);}
.memo-group{transition:opacity 0.15s;}
.memo-group.group-dragging{opacity:0.3;}
.memo-group.group-drag-over-top{border-top:2px solid var(--accent);padding-top:2px;}
.memo-group.group-drag-over-bottom{border-bottom:2px solid var(--accent);padding-bottom:2px;}
.memo-group-drag-handle{color:var(--text3);cursor:grab;font-size:1.1em;opacity:0.5;user-select:none;padding:0 2px;}
.memo-group-drag-handle:hover{opacity:1;}
.memo-group.drag-over > div:last-child{outline:2px dashed var(--accent);outline-offset:4px;border-radius:8px;background:var(--accent-bg);}
.memo-card-header{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
.memo-card-title{font-size:0.85em;font-weight:500;color:var(--text);line-height:1.4;}
.memo-card-date{font-size:0.72em;color:var(--text3);font-family:var(--mono);flex-shrink:0;}
.memo-linked-task{font-size:0.75em;color:var(--accent2);background:var(--accent-bg);padding:2px 7px;border-radius:4px;align-self:flex-start;}
.memo-preview{font-size:0.8em;color:var(--text2);line-height:1.6;white-space:pre-wrap;}
.memo-tags{display:flex;flex-wrap:wrap;gap:5px;}
.memo-tag{font-size:0.72em;padding:2px 8px;border-radius:99px;font-family:var(--mono);}
.chips{display:flex;flex-direction:column;gap:2px;overflow:hidden;flex:1;min-height:0;}
.more-chip{font-size:0.68em;color:var(--text3);margin-top:1px;padding:0 0.2em;cursor:pointer;flex-shrink:0;}
.more-chip:hover{color:var(--text2);}
.more-chip.tr{color:var(--amber);opacity:0.5;}
.more-chip.tr:hover{opacity:1;}

/* ── Chip Memo Tooltip ── */
.chip-memo-popup{
  position:fixed;z-index:800;
  background:var(--bg2);border:1px solid var(--accent);border-radius:12px;
  padding:1em 1.1em;min-width:320px;max-width:420px;width:380px;
  box-shadow:0 8px 32px rgba(0,0,0,0.65);
  pointer-events:auto;
  max-height:70vh;overflow-y:auto;
}
.chip-memo-popup-title{
  font-size:0.9em;font-weight:600;color:var(--text);
  margin-bottom:8px;padding-bottom:8px;
  border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px;
}
.chip-memo-popup-body{
  font-size:0.82em;color:var(--text2);line-height:1.65;white-space:pre-wrap;word-break:break-word;
}
.chip-memo-popup-hint{
  font-size:0.72em;color:var(--text3);margin-top:10px;padding-top:8px;border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
/* ── Rich Text Editor ── */
#memo-content-editor:empty:before{content:attr(data-placeholder);color:var(--text3);pointer-events:none;}
#memo-content-editor span[style*="color"]{border-radius:2px;}
.txt-color-btn{transition:transform 0.1s;display:inline-block;}
.txt-color-btn:hover{transform:scale(1.2);}

.chip-memo-badge{
  display:inline-block;width:6px;height:6px;border-radius:50%;
  background:var(--accent2);flex-shrink:0;margin-left:3px;margin-bottom:1px;
  vertical-align:middle;
}

::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px;}
</style>
</head>
<body>
<div class="header">
  <div class="htitle">✦ 업무 <span>플래너</span></div>
  <div class="hcenter">
    <button onclick="changeMonth(-1)">◀</button>
    <span class="mlabel" id="mlabel"></span>
    <button onclick="changeMonth(1)">▶</button>
    <button onclick="goToday()" style="font-size:0.78em;padding:0.35em 0.7em;border-radius:6px;background:var(--accent-bg);border:1px solid var(--accent);color:var(--accent2);cursor:pointer;font-family:var(--sans);transition:all 0.15s;" onmouseover="this.style.background='var(--accent)';this.style.color='#fff'" onmouseout="this.style.background='var(--accent-bg)';this.style.color='var(--accent2)'">오늘</button>
  </div>
  <div style="display:flex;align-items:center;gap:10px;">
    <div style="position:relative;">
      <input id="search-input" placeholder="업무 검색... (엔터)" onkeydown="if(event.key==='Enter')doSearch(this.value.trim())"
        style="background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:0.4em 0.85em 0.4em 26px;color:var(--text);font-size:0.78em;font-family:var(--sans);outline:none;width:clamp(100px,13vw,160px);transition:border-color 0.15s;"
        onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='var(--border)'">
      <span style="position:absolute;left:8px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:0.85em;pointer-events:none">🔍</span>
    </div>
    <button onclick="showPage('main')" style="background:none;border:1px solid var(--border2);color:var(--text2);padding:0.4em 0.85em;border-radius:6px;cursor:pointer;font-size:0.78em;font-family:var(--sans);transition:all 0.15s;"
      onmouseover="this.style.borderColor='var(--accent)';this.style.color='var(--accent2)'"
      onmouseout="this.style.borderColor='var(--border2)';this.style.color='var(--text2)'">
      📅 플래너
    </button>
    <button onclick="showPage('notice')" style="background:none;border:1px solid var(--border2);color:var(--text2);padding:0.4em 0.85em;border-radius:6px;cursor:pointer;font-size:0.78em;font-family:var(--sans);transition:all 0.15s;"
      onmouseover="this.style.borderColor='var(--accent)';this.style.color='var(--accent2)'"
      onmouseout="this.style.borderColor='var(--border2)';this.style.color='var(--text2)'">
      📌 공지
    </button>
    <button onclick="showPage('memo')" style="background:none;border:1px solid var(--border2);color:var(--text2);padding:0.4em 0.85em;border-radius:6px;cursor:pointer;font-size:0.78em;font-family:var(--sans);transition:all 0.15s;"
      onmouseover="this.style.borderColor='var(--accent)';this.style.color='var(--accent2)'"
      onmouseout="this.style.borderColor='var(--border2)';this.style.color='var(--text2)'">
      🗒 메모
    </button>
    <button onclick="showPage('template')" style="background:none;border:1px solid var(--border2);color:var(--text2);padding:0.4em 0.85em;border-radius:6px;cursor:pointer;font-size:0.78em;font-family:var(--sans);transition:all 0.15s;"
      onmouseover="this.style.borderColor='var(--accent)';this.style.color='var(--accent2)'"
      onmouseout="this.style.borderColor='var(--border2)';this.style.color='var(--text2)'">
      📋 템플릿
    </button>
    <span class="ss loading" id="ss">연결 중...</span>
  </div>
</div>

<div id="page-main"><div id="main-wrapper" style="background:var(--bg);flex:1;overflow:hidden;"><div class="layout">
  <!-- Left -->
  <div class="panel">
    <div class="ptitle"><span>💸 이체 현황</span><button class="addbtn addbtn-sm" onclick="copyRecurringTransfers()" title="반복 이체를 다음달에 복사">🔁 다음달 복사</button></div>
    <div class="sbox" id="tr-summary"></div>
    <div id="tr-list"></div>
    <button class="addbtn" onclick="openModal('tr')">+ 이체 추가</button>
  </div>
  <!-- Center -->
  <div class="panel cal-panel">
    <div class="ptitle">
      <span>📅 월간 캘린더</span>
      <button class="addbtn addbtn-sm" onclick="openTaskModalWithDate()">+ 업무 추가</button>
    </div>
    <div class="cgrid" id="cal-grid"></div>
  </div>
  <!-- Right -->
  <div class="panel dpanel">
    <div class="ptitle"><span>📋 업무 상세</span></div>
    <div id="detail"></div>
  </div>


</div><!-- end layout -->
</div><!-- end main-wrapper -->
</div><!-- end page-main -->

<!-- Notice Page -->
<div id="page-notice" style="display:none;pointer-events:none;height:calc(100vh - 3.2em);overflow-y:auto;">
  <div style="max-width:1100px;margin:0 auto;padding:24px 28px;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
      <h2 style="font-size:1em;font-weight:500;color:var(--text)">📌 공지</h2>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:24px;">
      <div style="background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;">
        <div style="display:flex;align-items:center;justify-content:space-between;padding:0.5em 1em;border-bottom:1px solid var(--border);background:var(--bg3);">
          <span style="font-size:0.95em;font-weight:500">📄 안내문구</span>
          <button class="addbtn addbtn-sm" onclick="openNoticeModal(null,null,'안내문구')">+ 추가</button>
        </div>
        <div style="padding:14px 18px" id="drop-안내문구" ondragover="event.preventDefault()" ondrop="dropNotice(event,'안내문구')"><div id="ntree-안내문구"></div></div>
      </div>
      <div style="background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;">
        <div style="display:flex;align-items:center;justify-content:space-between;padding:0.5em 1em;border-bottom:1px solid var(--border);background:var(--bg3);">
          <span style="font-size:0.95em;font-weight:500">📋 공지</span>
          <button class="addbtn addbtn-sm" onclick="openNoticeModal(null,null,'공지')">+ 추가</button>
        </div>
        <div style="padding:14px 18px" id="drop-공지" ondragover="event.preventDefault()" ondrop="dropNotice(event,'공지')"><div id="ntree-공지"></div></div>
      </div>
    </div>
  </div>
</div>

<!-- Memo Page -->
<div id="page-memo" style="display:none;pointer-events:none;height:calc(100vh - 3.2em);overflow-y:auto;">
  <div style="max-width:1200px;margin:0 auto;padding:24px 28px;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px;">
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
        <h2 style="font-size:1em;font-weight:500;color:var(--text)">🗒 메모</h2>
        <select id="memo-filter-tag" onchange="renderMemos()"
          style="background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:0.35em 0.75em;color:var(--text2);font-size:0.8em;font-family:var(--sans);outline:none;cursor:pointer;">
          <option value="">전체 태그</option>
        </select>
        <select id="memo-filter-task" onchange="renderMemos()"
          style="background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:0.35em 0.75em;color:var(--text2);font-size:0.8em;font-family:var(--sans);outline:none;cursor:pointer;">
          <option value="">전체 업무</option>
        </select>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <input id="memo-search" placeholder="메모 검색..." oninput="renderMemos()"
          style="background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:0.35em 0.75em;color:var(--text);font-size:0.8em;font-family:var(--sans);outline:none;width:160px;"
          onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='var(--border)'">
        <button class="addbtn addbtn-sm" onclick="openMemoModal()">+ 메모 추가</button>
        <button id="memo-select-btn" class="addbtn addbtn-sm" onclick="toggleMemoSelectMode()"
          style="background:var(--bg3);border-color:var(--border2);color:var(--text2);">☑ 선택</button>
      </div>
    </div>
    <!-- 일괄 삭제 바 (선택 모드일 때만 노출) -->
    <div id="memo-bulk-bar" style="display:none;align-items:center;gap:10px;padding:8px 12px;background:var(--red-bg);border:1px solid var(--red);border-radius:8px;margin-bottom:14px;">
      <span id="memo-select-count" style="font-size:0.82em;color:var(--red);font-weight:500">0개 선택됨</span>
      <button onclick="bulkDeleteMemos()" style="font-size:0.78em;padding:3px 12px;border-radius:5px;background:var(--red);color:#fff;border:none;cursor:pointer;font-family:var(--sans);">🗑 선택 삭제</button>
      <button onclick="selectAllMemos()" style="font-size:0.78em;padding:3px 10px;border-radius:5px;background:var(--bg3);color:var(--text2);border:1px solid var(--border2);cursor:pointer;font-family:var(--sans);">전체 선택</button>
      <button onclick="toggleMemoSelectMode()" style="font-size:0.78em;padding:3px 10px;border-radius:5px;background:var(--bg3);color:var(--text3);border:1px solid var(--border2);cursor:pointer;font-family:var(--sans);margin-left:auto;">취소</button>
    </div>
    <div id="memo-list" style="display:block;"></div>
    <div id="memo-empty" style="display:none;text-align:center;padding:60px 0;color:var(--text3);">
      <div style="font-size:2em;margin-bottom:8px">🗒</div>
      <div>아직 메모가 없어요</div>
    </div>
  </div>
</div>

<!-- Template Page -->
<div id="page-template" style="display:none;pointer-events:none;height:calc(100vh - 3.2em);overflow-y:auto;">
  <div style="max-width:1200px;margin:0 auto;padding:24px 28px;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px;">
      <h2 style="font-size:1em;font-weight:500;color:var(--text)">📋 업무 템플릿</h2>
    </div>
    <!-- 유형 탭 -->
    <div style="display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap;align-items:center;" id="tmpl-tabs">
      <button class="tmpl-tab active" onclick="setTmplTab('전체')">전체</button>
      <button class="tmpl-tab" onclick="setTmplTab('상시')">상시</button>
      <button class="tmpl-tab" onclick="setTmplTab('월간')">월간</button>
      <button class="tmpl-tab" onclick="setTmplTab('분기')">분기</button>
      <button class="tmpl-tab" onclick="setTmplTab('반기')">반기</button>
      <button class="tmpl-tab" onclick="setTmplTab('연간')">연간</button>
    </div>
    <!-- 2단 레이아웃: 좌=목록, 우=상세 -->
    <div style="display:grid;grid-template-columns:280px 1fr;gap:16px;align-items:start;">
      <div id="tmpl-list" style="background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden;"></div>
      <div id="tmpl-detail" style="background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:20px;min-height:300px;">
        <div style="color:var(--text3);text-align:center;padding:60px 0;font-size:0.85em;">업무를 선택해주세요</div>
      </div>
    </div>
  </div>
</div>

<!-- Memo Modal -->
<div class="overlay" id="modal-memo">
  <div class="modal" style="width:46em;max-height:86vh;overflow-y:auto;">
    <div class="mtitle" id="memo-modal-title">메모 추가</div>
    <input type="hidden" id="memo-edit-id">
    <div class="frow">
      <div class="fg" style="flex:1">
        <label class="fl">카테고리</label>
        <input class="fi" id="memo-title-input" placeholder="카테고리명 (예: 급여계산, 세무, 회의록)">
      </div>
    </div>
    <div class="frow">
      <div class="fg" style="flex:1">
        <label class="fl">연결 업무 <span style="color:var(--text3);font-size:0.85em">(선택)</span></label>
        <select class="fi" id="memo-task-id" style="background:var(--bg3);color:var(--text);" onchange="onMemoTaskChange()">
          <option value="">업무 선택 안 함</option>
        </select>
      </div>
      <div class="fg" style="flex:1">
        <label class="fl">연결 세부태스크 <span style="color:var(--text3);font-size:0.85em">(선택)</span></label>
        <select class="fi" id="memo-sub-id" style="background:var(--bg3);color:var(--text);">
          <option value="">세부태스크 선택 안 함</option>
        </select>
      </div>
    </div>
    <div class="frow">
      <div class="fg" style="flex:1">
        <label class="fl">태그 <span style="color:var(--text3);font-size:0.85em">(쉼표로 구분)</span></label>
        <input class="fi" id="memo-tags-input" placeholder="예: 회의, 중요, 아이디어">
      </div>
    </div>
    <div style="margin-bottom:0.6em;">
      <label class="fl">내용</label>
      <!-- 색상 툴바 -->
      <div id="memo-editor-toolbar" style="display:flex;align-items:center;gap:5px;padding:5px 8px;background:var(--bg3);border:1px solid var(--border);border-bottom:none;border-radius:7px 7px 0 0;flex-wrap:wrap;">
        <span style="font-size:0.72em;color:var(--text3);margin-right:2px;">글자색</span>
        <span class="txt-color-btn" data-color="#f87171" title="레드" style="width:18px;height:18px;border-radius:3px;background:#f87171;cursor:pointer;flex-shrink:0;"></span>
        <span class="txt-color-btn" data-color="#fbbf6a" title="오렌지" style="width:18px;height:18px;border-radius:3px;background:#fbbf6a;cursor:pointer;flex-shrink:0;"></span>
        <span class="txt-color-btn" data-color="#fadf6b" title="옐로우" style="width:18px;height:18px;border-radius:3px;background:#fadf6b;cursor:pointer;flex-shrink:0;"></span>
        <span class="txt-color-btn" data-color="#6ee7b0" title="그린" style="width:18px;height:18px;border-radius:3px;background:#6ee7b0;cursor:pointer;flex-shrink:0;"></span>
        <span class="txt-color-btn" data-color="#5eead4" title="틸" style="width:18px;height:18px;border-radius:3px;background:#5eead4;cursor:pointer;flex-shrink:0;"></span>
        <span class="txt-color-btn" data-color="#7eb8f7" title="블루" style="width:18px;height:18px;border-radius:3px;background:#7eb8f7;cursor:pointer;flex-shrink:0;"></span>
        <span class="txt-color-btn" data-color="#c084fc" title="퍼플" style="width:18px;height:18px;border-radius:3px;background:#c084fc;cursor:pointer;flex-shrink:0;"></span>
        <span class="txt-color-btn" data-color="#fda4af" title="핑크" style="width:18px;height:18px;border-radius:3px;background:#fda4af;cursor:pointer;flex-shrink:0;"></span>

<script>

/* ── Transfers ── */
function renderTr(){

    <div class="srow"><span>예정</span><span class="sval pend">${fmt(total-done)}</span></div>`;
  const sorted=[...transfers].sort((a,b)=>(a.sort_order||a.day*1000+a.id)-(b.sort_order||b.day*1000+b.id));

  document.getElementById('tr-list').innerHTML=Object.keys(g).sort((a,b)=>a-b).map(day=>`

      </div>
      <div style="font-size:0.85em;margin-bottom:3px;"><span class="tamt">${fmt(t.amount)}</span></div>

      <div class="tactions">
        <button class="chkbtn${t.done?' checked':''}" onclick="event.stopPropagation();toggleTr(${t.id},${t.done})"></button>
        <button class="icobtn" onclick="event.stopPropagation();editTr(${t.id})" title="수정">✏</button>
      </div>
    </div>`).join('')}`).join('');
}

let _trDragId=null;
function trDragStart(e,id){
  _trDragId=id;
  e.dataTransfer.effectAllowed='move';
  e.currentTarget.style.opacity='0.4';
}
function trDragOver(e){
  e.preventDefault();
  e.currentTarget.style.borderColor='var(--accent)';
  e.currentTarget.style.background='var(--accent-bg)';
}
function trDragLeave(e){
  e.currentTarget.style.borderColor='';
  e.currentTarget.style.background='';
}
async function trDrop(e,targetId){
  e.preventDefault();
  e.currentTarget.style.borderColor='';
  e.currentTarget.style.background='';
  if(_trDragId===null||_trDragId===targetId){_trDragId=null;return;}
  // 현재 순서 기준으로 sort_order 재계산
  const sorted=[...transfers].sort((a,b)=>(a.sort_order||a.day*1000+a.id)-(b.sort_order||b.day*1000+b.id));
  const fromIdx=sorted.findIndex(t=>t.id===_trDragId);
  const toIdx=sorted.findIndex(t=>t.id===targetId);
  if(fromIdx<0||toIdx<0){_trDragId=null;return;}
  sorted.splice(toIdx,0,sorted.splice(fromIdx,1)[0]);
  // sort_order 일괄 업데이트
  await Promise.all(sorted.map((t,i)=>sb.from('transfers').update({sort_order:i+1}).eq('id',t.id)));
  _trDragId=null;
  await loadAll();
}

async function toggleTr(id,done){

  const{error}=await sb.from('transfers').update({done:newDone}).eq('id',id);
  if(error){showToast('오류: '+error.message,true);return;}
  await sb.from('transfer_history').insert([{transfer_id:id,text:`이체 ${newDone?'완료':'미완료'}로 변경 — ${t?.name||''}`,date:todayStr()}]);
  await loadAll();
  if(selDate) renderDetail(selDate);
}

// 주말·공휴일이면 직전 평일로 조정
function adjustWeekend(year,month,day){
  let d=new Date(year,month-1,day);
  for(let i=0;i<7;i++){
    const dow=d.getDay();
    const mmdd=String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    const yyyymmdd=d.getFullYear()+'-'+mmdd;
    const isHoliday=!!(SUBSTITUTE[yyyymmdd]||LUNAR_HOLIDAYS[yyyymmdd]||HOLIDAYS[mmdd]);
    if(dow===0||dow===6||isHoliday){
      d.setDate(d.getDate()-1);
    } else {
      break;
    }
  }
  return d.getDate();
}

// 다음달 반복 이체 복사 (매월 1일 자동 실행 개념)
async function copyRecurringTransfers(){
  const nextM=curM+2>12?1:curM+2;
  const nextY=curM+2>12?curY+1:curY;
  // 이미 다음달에 같은 이름 이체가 있으면 skip
  const{data:existing}=await sb.from('transfers').select('name').eq('year',nextY).eq('month',nextM);
  const existNames=new Set((existing||[]).map(t=>t.name));
  const recurring=transfers.filter(t=>t.is_recurring);
  for(const t of recurring){
    if(existNames.has(t.name))continue;
    const adjDay=adjustWeekend(nextY,nextM,t.recurring_day||t.day);
    await sb.from('transfers').insert([{
      name:t.name,day:adjDay,amount:t.amount,type:t.type,
      receiver:t.receiver,bank:t.bank,account:t.account,
      memo:t.memo,done:false,month:nextM,year:nextY,
      is_recurring:true,recurring_day:t.recurring_day||t.day
    }]);
  }
  await loadAll();
  showToast(`다음달(${nextY}년 ${nextM}월)에 반복 이체 ${recurring.length}건을 복사했어요!`,false);
}

async function saveTr(){
  const editId=document.getElementById('tr-edit-id').value;
  const name=document.getElementById('tr-name').value.trim();
  const isRecurring=document.getElementById('tr-recurring').checked;
  let day, month, year;

    day=parseInt(document.getElementById('tr-day').value);
    if(!name||!day)return showToast('이체명과 이체일은 필수예요.',true);
    month=curM+1; year=curY;
  } else {
    const dateVal=document.getElementById('tr-day-date').value;
    if(!name||!dateVal)return showToast('이체명과 이체일은 필수예요.',true);
    const parts=dateVal.split('-');
    year=parseInt(parts[0]); month=parseInt(parts[1]); day=parseInt(parts[2]);
  }
  const isRecurringChecked=document.getElementById('tr-recurring').checked;
  const p={name,day,amount:getAmountVal(),type:document.getElementById('tr-type').value,receiver:document.getElementById('tr-receiver').value.trim(),bank:document.getElementById('tr-bank').value.trim(),account:document.getElementById('tr-account').value.trim(),memo:document.getElementById('tr-memo').value.trim(),link:document.getElementById('tr-link').value.trim(),is_recurring:isRecurringChecked,recurring_day:isRecurringChecked?day:null,month,year};
  if(editId){
    const{error}=await sb.from('transfers').update(p).eq('id',editId);
    if(error)return showToast('수정 오류: '+error.message,true);
    await sb.from('transfer_history').insert([{transfer_id:N(editId),text:`이체 정보 수정 — ${name}${isRecurringChecked?' (반복설정)':''}`,date:todayStr()}]);
  }else{
    const{error}=await sb.from('transfers').insert([{...p,done:false}]);
    if(error)return showToast('저장 오류: '+error.message,true);
  }
  const refreshId=editId?N(editId):null;
  closeModal('tr');resetTrModal();await loadAll();

}

async function deleteTr(){

function getHoliday(year, month, day){
  const mmdd = String(month).padStart(2,'0')+'-'+String(day).padStart(2,'0');
  const yyyymmdd = year+'-'+String(month).padStart(2,'0')+'-'+String(day).padStart(2,'0');
  return SUBSTITUTE[yyyymmdd] || LUNAR_HOLIDAYS[yyyymmdd] || HOLIDAYS[mmdd] || null;
}

const typeColor=t=>({상시:'blue',월간:'purple',분기:'teal',반기:'pink',연간:'red'}[t]||'purple');
const getProg=id=>{const s=subtasks.filter(s=>N(s.task_id)===N(id));return s.length?Math.round(s.filter(s=>s.done).length/s.length*100):null;};
const getSubs=id=>subtasks.filter(s=>N(s.task_id)===N(id)).sort((a,b)=>{
  if(!a.due_date&&!b.due_date)return 0;
  if(!a.due_date)return 1;
  if(!b.due_date)return -1;
  return a.due_date.localeCompare(b.due_date);
});

function renderCal(){
  const dows=['일','월','화','수','목','금','토'];
  let html=dows.map((d,i)=>`<div class="cdow ${i===0?'sun':i===6?'sat':''}">${d}</div>`).join('');
  const fd=new Date(curY,curM,1).getDay(),dim=new Date(curY,curM+1,0).getDate(),today=new Date();
  for(let i=0;i<fd;i++)html+=`<div class="cday empty"></div>`;
  for(let d=1;d<=dim;d++){
    const dow=(fd+d-1)%7;
    const isT=today.getDate()===d&&today.getMonth()===curM&&today.getFullYear()===curY;
    const holiday=getHoliday(curY,curM+1,d);
    const isHoliday=!!holiday;
    const isSun=dow===0;
    const isSat=dow===6;
    const cls=['cday',isSun||isHoliday?'sun':isSat?'sat':'',isT?'today':'',selDate===d?'sel':''].filter(Boolean).join(' ');
    const dt=transfers.filter(t=>t.day===d),tk=tasks.filter(t=>t.day===d);
    const dateStr=`${curY}-${String(curM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const st=subtasks.filter(s=>s.due_date===dateStr);

    // 이체+업무 합계 최대 7개, 더보기 둘 다 있으면 6개
    const dtSorted=[...dt].sort((a,b)=>a.done===b.done?0:a.done?1:-1);
    const isTaskDone=t=>(t.done||(t.status||'').includes('완료'));
    const allTasks=window._allTasksCache||tasks;
    const tkAll=[
      ...tk.map(t=>{
        const hasMemo=!!(t.memo&&t.memo.trim())||memos.some(m=>N(m.task_id)===N(t.id));
        const hasSubMemo=!hasMemo&&subtasks.filter(s=>N(s.task_id)===N(t.id)).some(s=>memos.some(m=>N(m.sub_id)===N(s.id)));
        const showBadge=hasMemo||hasSubMemo;
        return {done:isTaskDone(t), html:`<div class="chip ${t.task_type||'월간'}${isTaskDone(t)?' task-done':''}" draggable="true" ondragstart="onChipDragStart(event,'task',${t.id})" onclick="event.stopPropagation();showChipMemo(event,${t.id})"><span class="chip-text">${isTaskDone(t)?'✓ ':''}${t.name}</span>${showBadge?`<span class='chip-memo-badge' title='${hasSubMemo?'하위태스크 메모 있음':'메모 있음'}'></span>`:''}</div>`};
      }),
      ...st.map(s=>{
        const parent=allTasks.find(t=>N(t.id)===N(s.task_id));
        const pType=parent?parent.task_type||'월간':'월간';
        return {done:!!s.done, html:`<div class="chip ${pType} sub${s.done?' task-done':''}" draggable="true" ondragstart="onChipDragStart(event,'sub',${s.id})" onclick="event.stopPropagation();showSubParentTask(${s.id})">${s.done?'✓ ':''}↳ ${s.name}</div>`};
      })
    ].sort((a,b)=>a.done===b.done?0:a.done?1:-1);

    const totalSlots=7;
    const dtCount=dtSorted.length;
    const tkCount=tkAll.length;

    // 1차: 이체/업무 각각 실제 건수 기준으로 7개 배분
    let dtShow=Math.min(dtCount, totalSlots);
    let tkShow=Math.min(tkCount, totalSlots-dtShow);
    // 이체가 적으면 업무로 채움, 업무가 적으면 이체로 채움
    dtShow=Math.min(dtCount, totalSlots-tkShow);
    tkShow=Math.min(tkCount, totalSlots-dtShow);

    const hasMoreDt=dtCount>dtShow;
    const hasMoreTk=tkCount>tkShow;

    // 둘 다 더보기 생기면 각각 1개씩 줄여서 더보기 줄 공간 확보
    if(hasMoreDt&&hasMoreTk){
      dtShow=Math.min(dtCount,3);
      tkShow=Math.min(tkCount,3);
    }

    const dtShown=dtSorted.slice(0,dtShow).map(t=>
      `<div class="chip tr${t.done?' done':''}" draggable="true" ondragstart="onChipDragStart(event,'tr',${t.id})" onclick="event.stopPropagation()">${t.done?'✓ ':''}${t.name}</div>`
    ).join('');
    const dtMore=dtCount>dtShow?`<div class="more-chip tr" onclick="event.stopPropagation();forceSelDay(${d},'tr')">이체 외 ${dtCount-dtShow}건 ▾</div>`:'';
    const tkItems=tkAll;
    const tkShown=tkItems.slice(0,tkShow).map(x=>x.html).join('');
    const tkMore=tkCount>tkShow?`<div class="more-chip" onclick="event.stopPropagation();forceSelDay(${d},'tk')">업무 외 ${tkCount-tkShow}건 ▾</div>`:'';

    const chips=dtShown+tkShown;
    const moreChips=(dtMore||tkMore) ? `${dtMore}${tkMore}` : '';
    const moreHtml='';
    html+=`<div class="${cls}"
      onclick="selDay(${d})"
      ondragover="onCalDragOver(event)"
      ondragleave="onCalDragLeave(event)"
      ondrop="onCalDrop(event,${d})">
      <div class="dnum">${d}</div>
      ${holiday?`<div class="holiday-label">${holiday}</div>`:''}
      <div class="chips">${chips}</div>
      ${moreChips}
    </div>`;
  }
  document.getElementById('cal-grid').innerHTML=html;
}

/* ── Chip Memo Popup ── */
let _chipPopupEl=null;
function closeChipMemo(){
  if(_chipPopupEl){_chipPopupEl.remove();_chipPopupEl=null;}
}
function showChipMemo(e, taskId){
  closeChipMemo();
  const allTasks=window._allTasksCache||tasks;
  const t=tasks.find(x=>x.id===taskId)||allTasks.find(x=>x.id===taskId);
  if(!t) return;

  const taskMemo=(t.memo||'').trim();
  const link=(t.link||'').trim();

  // 상위태스크 직접 연결 메모 (sub_id 없는 것만)
  const linkedMemos=memos.filter(m=>N(m.task_id)===N(taskId)&&!m.sub_id);
  // 하위태스크를 통해 연결된 메모
  const taskSubs=subtasks.filter(s=>N(s.task_id)===N(taskId));
  const subLinkedMemos=memos.filter(m=>m.sub_id&&taskSubs.some(s=>N(s.id)===N(m.sub_id)));

  const hasAnything=taskMemo||link||linkedMemos.length||subLinkedMemos.length;
  if(!hasAnything){
    const d=Number(t.day);
    selDate=d;renderCal();renderDetail(d,'all');
    return;
  }

  // 줄바꿈 처리하되 color span은 보존
  const toText=html=>(html||'').replace(/<br\s*\/?>/gi,'\n').replace(/<(?!span|\/span)[^>]+>/gi,'').trim();

  // 제목별 그룹핑 후 렌더
  const renderMemoSection=(list,sectionLabel,accentColor)=>{
    if(!list.length) return '';
    const groups={};
    list.forEach(m=>{const cat=m.title||'메모';if(!groups[cat])groups[cat]=[];groups[cat].push(m);});
    return '<div style="margin-top:10px;border-top:1px solid var(--border);padding-top:8px">'
      +'<div style="font-size:0.72em;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px">'+sectionLabel+'</div>'
      +Object.entries(groups).map(([cat,items])=>
        '<div style="margin-bottom:8px">'
        +'<div style="font-size:0.8em;font-weight:600;color:var(--text2);margin-bottom:4px;display:flex;align-items:center;gap:5px">'
        +'<span style="width:3px;height:11px;background:'+accentColor+';border-radius:2px;display:inline-block;flex-shrink:0"></span>'
        +cat
        +'<span style="font-size:0.85em;color:var(--text3);font-weight:400">('+items.length+')</span>'
        +'</div>'
        +items.map(m=>{
          const tags=(m.tags||'').split(',').map(x=>x.trim()).filter(Boolean);
          const content=toText(m.content);
          const subItem=m.sub_id?taskSubs.find(s=>N(s.id)===N(m.sub_id)):null;
          return '<div style="background:var(--bg3);border-radius:7px;padding:0.5em 0.7em;margin-bottom:4px;border-left:2px solid '+accentColor+';">'
            +(tags.length?'<div style="display:flex;flex-wrap:wrap;gap:3px;margin-bottom:5px">'+tags.map(tag=>'<span style="font-size:0.7em;padding:1px 7px;border-radius:99px;background:var(--accent-bg);color:var(--accent2);font-family:var(--mono)">#'+tag+'</span>').join('')+'</div>':'')
            +(subItem?'<div style="font-size:0.72em;color:var(--teal);margin-bottom:3px">↳ '+subItem.name+'</div>':'')
            +(content?'<div style="font-size:0.8em;color:var(--text2);line-height:1.6;white-space:pre-wrap;word-break:break-word">'+content+'</div>':'')
            +'</div>';
        }).join('')
        +'</div>'
      ).join('')
      +'</div>';
  };

  const statusColors={진행중:'var(--blue)',완료:'var(--green)',예정:'var(--amber)',지연:'var(--red)'};
  const sc=statusColors[t.status]||'var(--amber)';

  const popup=document.createElement('div');
  popup.className='chip-memo-popup';
  popup.innerHTML=
    '<div class="chip-memo-popup-title">'
    +'<span style="flex:1">'+t.name+'</span>'
    +'<span style="font-size:0.78em;padding:2px 8px;border-radius:99px;background:rgba(0,0,0,0.3);color:'+sc+'">'+(t.status||'예정')+'</span>'
    +'</div>'
    +(taskMemo?'<div style="font-size:0.82em;color:var(--text2);line-height:1.65;white-space:pre-wrap;word-break:break-word">'+taskMemo+'</div>':'')
    +(link?'<div style="margin-top:5px"><a href="'+link+'" target="_blank" style="font-size:0.78em;color:var(--accent2);text-decoration:none">🔗 관련 링크</a></div>':'')
    +renderMemoSection(linkedMemos,'🗒 연결된 메모','var(--accent)')
    +renderMemoSection(subLinkedMemos,'🗒 하위태스크 메모','var(--teal)')
    +'<div class="chip-memo-popup-hint">'
    +'<span>외부 클릭 시 닫힘</span>'
    +'<span id="_cmemo_goto" style="cursor:pointer;color:var(--accent2);font-weight:500">🗒 메모 페이지로 →</span>'
    +'</div>';

  // 위치 계산
  const rect=(e.currentTarget||e.target).getBoundingClientRect();
  const vw=window.innerWidth, vh=window.innerHeight;
  let left=rect.left, top=rect.bottom+6;
  if(left+410>vw) left=Math.max(8,vw-418);
  if(top+420>vh) top=Math.max(8,rect.top-Math.min(420,rect.top-8));
  popup.style.left=left+'px';
  popup.style.top=top+'px';

  document.body.appendChild(popup);
  _chipPopupEl=popup;

  // 메모 페이지 이동 버튼
  popup.querySelector('#_cmemo_goto').addEventListener('click',()=>{
    closeChipMemo();
    showPage('memo');
    setTimeout(()=>{
      const sel=document.getElementById('memo-filter-task');
      if(sel){
        // option value가 task id와 일치하는 걸 찾아 선택
        const opt=[...sel.options].find(o=>String(o.value)===String(taskId));
        if(opt) sel.value=opt.value;
        renderMemos();
      }
    },120);
  });

  setTimeout(()=>{
    const handler=(ev)=>{
      if(!popup.contains(ev.target)){closeChipMemo();document.removeEventListener('click',handler);}
    };
    document.addEventListener('click',handler);
  },0);
}
function forceSelDay(d,filter='all'){
  selDate=d;
  document.querySelectorAll('.cday.sel').forEach(el=>el.classList.remove('sel'));
  const allDays=document.querySelectorAll('.cday');
  allDays.forEach(el=>{
    const num=parseInt(el.querySelector('.dnum')?.textContent);
    if(num===d) el.classList.add('sel');
  });
  renderDetail(d,filter);
}

async function showSubParentTask(subId){
  const s=subtasks.find(x=>x.id===subId);if(!s)return;
  // 현재 로드된 tasks에서 먼저 찾기
  let t=tasks.find(x=>N(x.id)===N(s.task_id));
  // 없으면 DB에서 직접 조회 (다른 월)
  if(!t){
    const{data}=await sb.from('tasks').select('*').eq('id',N(s.task_id)).single();
    if(!data)return showToast('상위 태스크를 찾을 수 없어요.',true);
    t=data;
  }
  // 해당 월로 이동
  if(t.year!==curY||t.month!==curM+1){
    curY=t.year; curM=t.month-1;
    document.getElementById('mlabel').textContent=`${curY}년 ${curM+1}월`;
    await loadAll();
  }
  selDate=t.day;
  renderCal();
  renderDetail(t.day);
  setTimeout(()=>{
    const el=document.querySelector(`[data-task-id="${t.id}"]`);
    if(el){
      el.scrollIntoView({behavior:'smooth',block:'nearest'});
      el.style.outline='2px solid var(--green)';
      setTimeout(()=>el.style.outline='',1500);
    }
  },150);
}

/* ── Drag & Drop (Calendar) ── */
let _dragType=null, _dragId=null;

function onChipDragStart(e, type, id){
  _dragType=type; _dragId=id;
  e.dataTransfer.effectAllowed='move';
  e.dataTransfer.setData('text/plain', `${type}:${id}`);
}

function onCalDragOver(e){
  e.preventDefault();
  e.dataTransfer.dropEffect='move';
  e.currentTarget.classList.add('drag-over');
}

function onCalDragLeave(e){
  e.currentTarget.classList.remove('drag-over');
}

async function onCalDrop(e, toDay){
  e.preventDefault();
  e.stopPropagation();
  e.currentTarget.classList.remove('drag-over');
  if(!_dragType||!_dragId) return;
  const type=_dragType, id=_dragId;
  _dragType=null; _dragId=null;
  if(type==='task'){
    const t=tasks.find(x=>x.id===id); if(!t||t.day===toDay) return;
    const{error}=await sb.from('tasks').update({day:toDay,month:curM+1,year:curY}).eq('id',id);
    if(error) return showToast('이동 오류: '+error.message, true);
    showToast(`"${t.name}" → ${toDay}일로 이동했어요.`, false);
  } else if(type==='tr'){
    const t=transfers.find(x=>x.id===id); if(!t||t.day===toDay) return;
    const{error}=await sb.from('transfers').update({day:toDay}).eq('id',id);
    if(error) return showToast('이동 오류: '+error.message, true);
    showToast(`"${t.name}" → ${toDay}일로 이동했어요.`, false);
  } else if(type==='sub'){
    const s=subtasks.find(x=>x.id===id);if(!s)return;
    const newDate=`${curY}-${String(curM+1).padStart(2,'0')}-${String(toDay).padStart(2,'0')}`;
    if(s.due_date===newDate)return;
    const{error}=await sb.from('subtasks').update({due_date:newDate}).eq('id',id);
    if(error) return showToast('이동 오류: '+error.message, true);
    showToast(`"${s.name}" → ${toDay}일로 이동했어요.`, false);
  }
  await loadAll();
  if(selDate) renderDetail(selDate);
}

/* ── Detail ── */
function renderDetail(d, filter='all'){
  const dt=transfers
    .filter(t=>Number(t.day)===Number(d))
    .sort((a,b)=>{
      if(a.done!==b.done) return a.done?1:-1; // 완료는 맨 아래
      return (a.sort_order||a.id)-(b.sort_order||b.id); // sort_order 기준
    });
  const tk=tasks.filter(t=>Number(t.day)===Number(d));
  const dateStr=`${curY}-${String(curM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  const st=subtasks.filter(s=>s.due_date===dateStr);
  const el=document.getElementById('detail');

  const showTr = filter==='all'||filter==='tr';
  const showTk = filter==='all'||filter==='tk';

  const filteredDt = showTr ? dt : [];
  const filteredTk = showTk ? tk : [];
  const filteredSt = showTk ? st : [];

  if(!filteredDt.length&&!filteredTk.length&&!filteredSt.length){
    el.innerHTML=`<div class="ddate">${curM+1}월 ${d}일${filter==='tr'?' · 이체':filter==='tk'?' · 업무':''}</div><div class="dempty" style="height:120px"><div>등록된 업무가 없어요</div></div>`;
    return;
  }
  let html=`<div class="ddate">${curM+1}월 ${d}일</div>`;
  if(filteredDt.length){
    html+=`<div class="dsec"><div class="dstitle">이체</div>`;
    filteredDt.forEach(t=>{
      const th=trHistory.filter(h=>N(h.transfer_id)===N(t.id));
      html+=`<div class="ditem" style="border-left:3px solid var(--amber);">
        <div class="ditem-actions"><button class="icobtn" onclick="editTr(${t.id})" title="수정">✏</button></div>

          <div class="mi">은행 <span>${t.bank||'-'}</span></div>
          <div class="mi">계좌 <span style="font-family:var(--mono);font-size:0.85em">${t.account||'-'}</span></div>

        ${t.memo?`<div style="font-size:0.92em;color:var(--text2);margin-top:5px">${t.memo}</div>`:''}

  }
  if(filteredTk.length){
    html+=`<div class="dsec"><div class="dstitle">업무</div>`;
    filteredTk.forEach(t=>{
      const tc=typeColor(t.task_type||'월간');
      const sc={진행중:'blue',완료:'green',예정:'amber',지연:'red'}[t.status]||'amber';
      const borderColor={상시:'var(--blue)',월간:'var(--accent)',분기:'var(--green)',반기:'var(--amber)',연간:'var(--red)'}[t.task_type||'월간']||'var(--accent)';
      const subs=getSubs(t.id);
      const prog=getProg(t.id),progress=prog!==null?prog:(t.progress||0);
      const imgs=images.filter(i=>N(i.task_id)===N(t.id));
      // 업무 일지: task_key(업무명) 기준으로 전체 월 공유
      const taskKey=t.task_key||t.name;
      const jours=journals.filter(j=>j.task_key===taskKey||N(j.task_id)===N(t.id));

      html+=`<div data-task-id="${t.id}" style="border-left:3px solid ${borderColor};padding-left:0.7em;margin-bottom:1.4em;">
      <div class="ditem" style="margin-bottom:0.5em;">

          <button class="icobtn" onclick="copyTask(${t.id})" title="다음달 복사">⊕</button>

        <div class="diname" style="cursor:pointer" onclick="openTaskDetail(${t.id})" title="클릭하여 상세 보기">${t.name}

      if(imgs.length){html+=`<div class="dstitle" style="margin-top:10px;margin-bottom:6px">첨부 이미지</div>

      html+=`<div class="upzone" onclick="document.getElementById('up-${t.id}').click()">
        <input type="file" id="up-${t.id}" accept="image/*" onchange="prepUpload(event,${t.id})">

      html+=`<div class="dstitle" style="margin-top:16px;margin-bottom:8px">📝 업무 일지 <span style="font-size:0.78em;color:var(--text3);font-weight:400">(업무명 '${taskKey}' 전체 기간 공유)</span></div>
        <div class="jlist">${jours.length?jours.map(j=>`<div class="jitem">
          <div class="jdate">${j.date||''}</div>
          <div class="jtext">${j.text}</div>
          <div class="jacts">
            <button class="icobtn" onclick="openJEdit(${j.id},'${(j.date||'').replace(/'/g,"\\'")}',\`${j.text.replace(/`/g,'\\`')}\`)" title="수정">✏</button>

          <div class="jadd-row"><input type="date" id="jd-${t.id}" value="${todayStr()}"></div>
          <textarea id="jt-${t.id}" placeholder="업무 진행 내용, 이슈, 결정사항 등을 자유롭게 기록하세요..."></textarea>
          <button onclick="addJournal(${t.id},'${taskKey.replace(/'/g,"\\'")}')">기록 저장</button>
          <div style="clear:both"></div>

    });
    html+=`</div>`;
  }
  if(filteredSt.length){
    // 상위태스크 전체 조회 (다른 월/연도 포함) - DB에서 직접
    const parentIds=[...new Set(filteredSt.map(s=>s.task_id).filter(Boolean))];
    const parentMap={};
    // 먼저 현재 로드된 tasks에서 찾고, 없으면 allTasks 캐시 사용
    for(const tid of parentIds){
      let t=tasks.find(x=>N(x.id)===N(tid));
      if(!t && window._allTasksCache) t=window._allTasksCache.find(x=>N(x.id)===N(tid));
      if(t) parentMap[tid]=t;
    }

    // 상위태스크별로 그룹핑
    const groups={};

    filteredSt.forEach(s=>{

      const borderColor=s.done?'var(--green)':'var(--accent)';

        <button class="stchk${s.done?' checked':''}" style="margin-top:2px;flex-shrink:0;" onclick="toggleSub(${s.id},${s.done},${s.task_id})"></button>

          <div class="diname" style="font-size:0.85em;">${s.name}</div>
          <div style="display:flex;align-items:center;gap:6px;">
            ${s.done?'<span class="badge green" style="font-size:0.75em;">완료</span>':''}
            ${s.due_date?`<span style="font-size:0.8em;color:var(--accent2);font-family:var(--mono)">${s.due_date}</span>`:''}
          </div>
        </div>
      </div>`;
    });

    html+=`</div>`;
  }
  el.innerHTML=html;
}

/* ── Subtasks ── */
async function addSub(taskId){
  const inp=document.getElementById('si-'+taskId);
  const dateInp=document.getElementById('si-date-'+taskId);
  const name=inp.value.trim();if(!name)return;
  const due_date=dateInp?dateInp.value||null:null;
  const{error}=await sb.from('subtasks').insert([{task_id:N(taskId),name,done:false,due_date}]);
  if(error){showToast('오류: '+error.message,true);return;}
  inp.value='';
  if(dateInp)dateInp.value='';
  const lbl=document.getElementById('si-date-label-'+taskId);
  if(lbl)lbl.textContent='📅 날짜';
  await loadAll();
}
async function autoCompleteTask(taskId){
  if(!taskId) return;
  const subs=subtasks.filter(s=>N(s.task_id)===N(taskId));
  const t=tasks.find(x=>N(x.id)===N(taskId));
  console.log('[autoComplete] taskId=',taskId,'task=',t?.name,'status=',t?.status,'subs=',subs.length,'doneCnt=',subs.filter(s=>s.done).length);
  if(!subs.length) return;
  if(!t) return;

  const total=subs.length;
  const doneCnt=subs.filter(s=>s.done).length;
  const today=new Date().toISOString().slice(0,10);

  let newStatus=t.status;

  if(doneCnt===total){
    newStatus='완료';
  } else if(doneCnt>0){
    const hasOverdue=subs.some(s=>!s.done && s.due_date && s.due_date<today);
    newStatus=hasOverdue?'지연':'진행중';
  } else {
    const hasOverdue=subs.some(s=>s.due_date && s.due_date<today);
    if(hasOverdue) newStatus='지연';
    else newStatus='예정';
  }

  console.log('[autoComplete] total=',total,'doneCnt=',doneCnt,'today=',today,'newStatus=',newStatus,'currentStatus=',t.status);
  if(newStatus!==t.status){
    await sb.from('tasks').update({status:newStatus}).eq('id',N(taskId));
    await loadAll();
    const msg={완료:'모든 세부태스크 완료 → 업무가 완료 처리됐어요.',진행중:'업무가 진행중으로 변경됐어요.',지연:'예정일이 지난 세부태스크 있음 → 업무가 지연으로 변경됐어요.',예정:'업무가 예정으로 변경됐어요.'};
    showToast(msg[newStatus]||'업무 상태가 변경됐어요.',false);
  }
}

async function toggleSub(subId,done,taskId){
  await sb.from('subtasks').update({done:!done}).eq('id',N(subId));
  await loadAll(); // 먼저 최신 subtasks 로드

}

function openCopyMonthModal(t,taskId,subs){
  const existing=document.getElementById('modal-copy-task');
  if(existing)existing.remove();

  // 월 선택 옵션 (현재월 포함 12개월)
  let monthOpts='';
  for(let i=1;i<=12;i++){
    const m=curM+i>12?curM+i-12:curM+i;
    const y=curM+i>12?curY+1:curY;
    monthOpts+=`<option value="${y}-${m}">${y}년 ${m}월</option>`;
  }

  const modal=document.createElement('div');
  modal.id='modal-copy-task';
  modal.className='overlay open';
  modal.innerHTML=`
    <div class="modal" style="width:34em;">
      <div class="mtitle">📋 업무 복사 — "${t.name}"</div>
      <div class="fg">
        <label class="fl">복사할 월 선택</label>
        <select class="fi" id="copy-target-month" onchange="onCopyMonthChange(${taskId})">${monthOpts}</select>
      </div>
      ${subs.length?`<div style="font-size:0.85em;color:var(--text3);margin-bottom:0.5em">하위 태스크 날짜를 지정해주세요.</div>
      <div style="margin-bottom:1em">${subs.map(s=>`
        <div style="display:flex;align-items:center;gap:8px;padding:0.4em 0;border-bottom:1px solid var(--border);">
          <span style="flex:1;font-size:0.85em;color:var(--text2)">${s.name}</span>
          <div style="position:relative;flex-shrink:0;">
            <button type="button" class="date-pick-btn" id="copy-sub-lbl-${s.id}"
              onclick="document.getElementById('copy-sub-date-${s.id}').showPicker()"
              style="font-size:0.78em;">📅 날짜선택</button>
            <input type="date" id="copy-sub-date-${s.id}"
              style="position:absolute;opacity:0;width:0;height:0;pointer-events:none;"
              value="${s.due_date||''}"
              onchange="document.getElementById('copy-sub-lbl-${s.id}').textContent='📅 '+(this.value?this.value.slice(5).replace('-','/'):'날짜선택')">
          </div>
        </div>`).join('')}
      </div>`:''}
      <div class="macts">
        <button class="btn bcnl" onclick="document.getElementById('modal-copy-task').remove()">취소</button>
        <button class="btn bpri" onclick="confirmCopyTask(${taskId})">복사</button>
      </div>
    </div>`;

let notices=[];
let nCollapsed=new Set();

async function loadNotices(){
  const{data,error}=await sb.from('notices').select('*').order('sort_order').order('created_at');
  if(!error){notices=data||[];renderNotices();}
}

function renderNotices(){
  ['안내문구','공지'].forEach(sec=>{
    const el=document.getElementById('ntree-'+sec);
    if(!el)return;
    const roots=notices.filter(n=>!n.parent_id&&(n.section||'공지')===sec);
    el.innerHTML=roots.length?renderNLevel(roots,sec):`<div style="font-size:0.92em;color:var(--text3);padding:8px 0">항목이 없어요</div>`;
  });
}

function renderNLevel(items,sec){
  return items.map(n=>{
    const children=notices.filter(c=>N(c.parent_id)===N(n.id));
    const isCol=nCollapsed.has('c_'+n.id);
    const memoOpen=nCollapsed.has('m_'+n.id);
    const hasC=children.length>0;
    const hasMemo=!!(n.memo&&n.memo.trim());
    return `<div draggable="true" ondragstart="dragNotice(event,${n.id})">
      <div class="nitem">
        <span class="narrow" onclick="nToggle('c_${n.id}')">${hasC?(isCol?'▶':'▼'):'•'}</span>
        <div class="nbody">
          <div class="ntitle-row">
            <span class="ntitle" onclick="${hasMemo?`nToggle('m_${n.id}')`:hasC?`nToggle('c_${n.id}')`:''}">${n.title||''}</span>
            ${hasMemo?`<span class="ntoggle" onclick="nToggle('m_${n.id}')">${memoOpen?'접기':'펼치기'}</span>`:''}
            <div class="nacts">
              ${hasMemo?`<button class="icobtn" onclick="copyNotice(${n.id})" title="복사">📋</button>`:''}
              <button class="icobtn" onclick="openNoticeModal(null,${n.id},'${sec}')" title="하위 추가">+</button>
              <button class="icobtn" onclick="editNotice(${n.id})" title="수정">✏</button>
              <button class="icobtn del" onclick="confirmDeleteNotice(${n.id})" title="삭제">✕</button>
            </div>
          </div>
          ${hasMemo&&memoOpen?`<div class="nmemo">${colorMemo(n.memo)}</div>`:''}
        </div>
      </div>
      ${hasC&&!isCol?`<div class="nchildren">${renderNLevel(children,sec)}</div>`:''}
    </div>`;
  }).join('');
}

function nToggle(key){

function copyNotice(id){
  const n=notices.find(x=>x.id===id);
  if(!n||!n.memo)return;
  const tmp=document.createElement('div');
  tmp.innerHTML=n.memo;
  // Convert <br> to newline
  tmp.querySelectorAll('br').forEach(br=>br.replaceWith(document.createTextNode('\n')));
  // Convert block elements to newline
  tmp.querySelectorAll('div,p,li').forEach(el=>{
    el.insertAdjacentText('beforebegin','\n');
    el.insertAdjacentText('afterend','\n');
  });
  // Get plain text only (no title)
  let text=tmp.innerText||tmp.textContent||'';
  text=text.replace(/\r\n/g,'\n').replace(/\r/g,'\n').replace(/\n{3,}/g,'\n\n').trim();
  const ta=document.createElement('textarea');
  ta.value=text;
  ta.style.position='fixed';ta.style.opacity='0';
  document.body.appendChild(ta);
  ta.focus();ta.select();
  try{
    document.execCommand('copy');
    const btn=event.target.closest('button');
    const orig=btn.textContent;
    btn.textContent='✓';
    btn.style.color='var(--green)';
    showToast('복사 완료!',false);
    setTimeout(()=>{btn.textContent=orig;btn.style.color='';},1500);
  }catch(e){showToast('복사에 실패했어요.',true);}
  document.body.removeChild(ta);
}

function applyColor(color){
  const el=document.getElementById('nm-memo');
  el.focus();
  const sel=window.getSelection();
  if(!sel||sel.rangeCount===0||sel.isCollapsed)return;
  const range=sel.getRangeAt(0);
  const selectedText=range.toString();
  if(!selectedText)return;
  range.deleteContents();
  if(color){
    const span=document.createElement('span');
    span.style.color=color;
    span.textContent=selectedText;
    range.insertNode(span);
  }else{
    // Remove color - insert plain text
    const text=document.createTextNode(selectedText);
    range.insertNode(text);
  }
  sel.removeAllRanges();
}

function colorMemo(text){
  if(!text) return '';
  // 이미 HTML 태그가 있으면 그대로 렌더링
  if(/<[a-z][\s\S]*>/i.test(text)){
    return `<div style="white-space:pre-wrap">${text}</div>`;
  }
  const lines = text.split('\n');
  let html = '';
  let inOl = false, inUl = false;

  const closeOl = () => { if(inOl){ html += '</ol>'; inOl=false; } };
  const closeUl = () => { if(inUl){ html += '</ul>'; inUl=false; } };

  for(let i=0; i<lines.length; i++){
    const line = lines[i];
    const olMatch = line.match(/^(\d+)[.)]\s+(.*)$/);
    const ulMatch = line.match(/^[-•*]\s+(.*)$/);

    if(olMatch){
      closeUl();
      if(!inOl){ html += '<ol>'; inOl=true; }
      html += `<li>${olMatch[2]}</li>`;
    } else if(ulMatch){
      closeOl();
      if(!inUl){ html += '<ul>'; inUl=true; }
      html += `<li>${ulMatch[1]}</li>`;
    } else {
      closeOl(); closeUl();
      if(line.trim()==='') html += '<br>';
      else html += `<p>${line}</p>`;
    }
  }
  closeOl(); closeUl();
  return html;
}

/* ── Memos ── */
const TAG_COLORS=['accent','green','amber','blue','teal','pink','red'];
function tagColor(tag){
  let h=0;for(let i=0;i<tag.length;i++)h=(h*31+tag.charCodeAt(i))&0xffff;
  const c=TAG_COLORS[h%TAG_COLORS.length];
  return {bg:`var(--${c}-bg)`,text:`var(--${c})`};
}

function renderMemos(){
  const q=(document.getElementById('memo-search')?.value||'').toLowerCase();
  const filterTag=document.getElementById('memo-filter-tag')?.value||'';
  const filterTask=document.getElementById('memo-filter-task')?.value||'';

  // 태그 필터 셀렉트 업데이트
  const allTags=[...new Set(memos.flatMap(m=>(m.tags||'').split(',').map(t=>t.trim()).filter(Boolean)))].sort();
  const tagSel=document.getElementById('memo-filter-tag');
  if(tagSel){
    const prev=tagSel.value;
    tagSel.innerHTML='<option value="">전체 태그</option>'+allTags.map(t=>`<option value="${t}"${t===prev?' selected':''}>${t}</option>`).join('');
  }

  // 업무 필터 셀렉트 업데이트
  const taskSel=document.getElementById('memo-filter-task');
  if(taskSel){
    const prev=taskSel.value;
    // 모든 메모에서 연결된 task_id 수집
    const linkedTaskIds=[...new Set(memos.map(m=>m.task_id).filter(Boolean))];
    taskSel.innerHTML='<option value="">전체 업무</option>'+
      linkedTaskIds.map(tid=>{
        const t=tasks.find(x=>N(x.id)===N(tid));
        return t?`<option value="${tid}"${String(tid)===prev?' selected':''}>${t.name}</option>`:'';
      }).join('');
  }

  let filtered=memos;
  if(q) filtered=filtered.filter(m=>{
    const titleMatch=(m.title||'').toLowerCase().includes(q);
    const contentMatch=(m.content||'').replace(/<[^>]+>/g,'').toLowerCase().includes(q);
    const tagList=(m.tags||'').split(',').map(t=>t.trim().toLowerCase());
    const tagMatch=tagList.some(t=>t.includes(q));
    return titleMatch||contentMatch||tagMatch;
  });
  if(filterTag) filtered=filtered.filter(m=>(m.tags||'').split(',').map(t=>t.trim()).includes(filterTag));
  if(filterTask) filtered=filtered.filter(m=>String(m.task_id)===filterTask);

  const list=document.getElementById('memo-list');
  const empty=document.getElementById('memo-empty');
  if(!filtered.length){list.innerHTML='';empty.style.display='block';return;}
  empty.style.display='none';

  // 제목(카테고리)별 그룹핑 — sort_order 기준 정렬 후
  const sortedFiltered=[...filtered].sort((a,b)=>{
    if(a.title!==b.title) return 0; // 같은 그룹 내에서만
    const ao=a.sort_order!=null?a.sort_order:99999;
    const bo=b.sort_order!=null?b.sort_order:99999;
    return ao-bo;
  });
  const groups={};
  sortedFiltered.forEach(m=>{
    const cat=m.title||'기타';
    if(!groups[cat]) groups[cat]=[];
    groups[cat].push(m);
  });

  // 그룹 순서 적용
  const groupKeys=Object.keys(groups);
  const orderedKeys=_memoGroupOrder
    ? [..._memoGroupOrder.filter(k=>groupKeys.includes(k)), ...groupKeys.filter(k=>!_memoGroupOrder.includes(k))]
    : groupKeys;

  list.innerHTML=orderedKeys.map(cat=>{
    const items=groups[cat];
