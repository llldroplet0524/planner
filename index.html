    const repTaskId=repMemo&&repMemo.task_id?repMemo.task_id:null;
    const repSubId=repMemo&&repMemo.sub_id?repMemo.sub_id:null;
    const catEsc=cat.replace(/'/g,"\\'").replace(/"/g,'&quot;');
    return `
    <div class="memo-group" data-cat="${catEsc}"
      ondragover="memoGroupDragOver(event,'${catEsc}')"
      ondragleave="memoGroupDragLeave(event)"
      ondrop="memoGroupDrop(event,'${catEsc}')"
      style="margin-bottom:24px;">
      <div class="memo-group-title" style="font-size:0.85em;font-weight:600;color:var(--text);padding:6px 0;margin-bottom:8px;border-bottom:1px solid var(--border2);display:flex;align-items:center;gap:8px;"
        draggable="true"
        ondragstart="memoGroupDragStart(event,'${catEsc}')"
        ondragend="memoGroupDragEnd(event)">
        <span class="memo-group-drag-handle" title="드래그하여 그룹 순서 변경">⠿</span>
        <span>${cat}</span>
        <span style="font-size:0.78em;color:var(--text3);font-weight:400">${items.length}개</span>
        <button onclick="openMemoModal(null,'${catEsc}',${repTaskId||'null'},${repSubId||'null'});event.stopPropagation();" class="addbtn addbtn-sm" style="margin-left:auto;">+ 추가</button>
      </div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;">
        ${items.map((m,mi)=>{
          const tags=(m.tags||'').split(',').map(t=>t.trim()).filter(Boolean);
          const linkedSub=m.sub_id?subtasks.find(x=>N(x.id)===N(m.sub_id)):null;
          const linkedTask=m.task_id?(window._allTasksCache||tasks).find(x=>N(x.id)===N(m.task_id)):null;
          const linkLabel=linkedSub?`↳ ${linkedSub.name}${linkedTask?' ('+linkedTask.name+')':''}`:linkedTask?linkedTask.name:null;
          const date=m.created_at?m.created_at.slice(0,10):'';
          const previewHtml=(m.content||'').replace(/<br\s*\/?>/gi,' ').slice(0,120);
          const isSel=_memoSelected.has(m.id);
          return `<div class="memo-card${isSel?' memo-card-selected':''}" draggable="true"
            data-memo-id="${m.id}" data-cat="${catEsc}" data-order-idx="${mi}"
            ondragstart="memoCardDragStart(event,${m.id},'${catEsc}')"
            ondragover="memoCardDragOver(event)"
            ondragleave="memoCardDragLeave(event)"
            ondrop="memoCardDrop(event,${m.id},'${catEsc}')"
            ondragend="memoDragEnd(event)"
            onclick="memoCardClick(event,${m.id})"
            style="cursor:${_memoSelectMode?'pointer':'grab'};position:relative;">
            ${_memoSelectMode?`<div style="position:absolute;top:10px;right:10px;width:18px;height:18px;border-radius:4px;border:2px solid ${isSel?'var(--accent)':'var(--border2)'};background:${isSel?'var(--accent)':'transparent'};display:flex;align-items:center;justify-content:center;font-size:0.75em;color:#fff">${isSel?'✓':''}</div>`:''}
            <div class="memo-card-header">
              <div class="memo-card-date" style="font-size:0.72em;color:var(--text3)">${date}</div>
              ${!_memoSelectMode?'<span class="memo-drag-handle" title="드래그하여 순서 변경" style="color:var(--text3);cursor:grab;font-size:1em;opacity:0.4;margin-left:auto">⠿</span>':''}
            </div>
            ${linkLabel?`<div class="memo-linked-task">🔗 ${linkLabel}</div>`:''}
            ${previewHtml?`<div class="memo-preview" style="overflow:hidden;max-height:4.8em;">${previewHtml}${(m.content||'').length>120?'…':''}</div>`:''}
            ${tags.length?`<div class="memo-tags">${tags.map(t=>{const c=tagColor(t);const hl=q&&t.toLowerCase().includes(q);return `<span class="memo-tag${hl?' memo-tag-hl':''}" style="background:${hl?c.text:c.bg};color:${hl?'#0f0f13':c.text}">${t}</span>`;}).join('')}</div>`:''}
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');
}


/* ── Memo Group Drag-to-reorder ── */
let _memoGroupDragCat=null;
function memoGroupDragStart(e, cat){
  _memoGroupDragCat=cat;
  e.dataTransfer.effectAllowed='move';
  e.dataTransfer.setData('text/plain','group:'+cat);
  e.currentTarget.closest('.memo-group').classList.add('group-dragging');
  e.stopPropagation();
}
function memoGroupDragEnd(e){
  document.querySelectorAll('.memo-group').forEach(g=>{
    g.classList.remove('group-dragging','group-drag-over-top','group-drag-over-bottom');
  });
  _memoGroupDragCat=null;
}
function memoGroupDragOver(e, cat){
  if(!_memoGroupDragCat||_memoGroupDragCat===cat) return;
  e.preventDefault();
  e.stopPropagation();
  const group=e.currentTarget.closest('.memo-group');
  const rect=group.getBoundingClientRect();
  const mid=rect.top+rect.height/2;
  group.classList.remove('group-drag-over-top','group-drag-over-bottom');
  if(e.clientY<mid) group.classList.add('group-drag-over-top');
  else group.classList.add('group-drag-over-bottom');
}
function memoGroupDragLeave(e){
  const group=e.currentTarget.closest('.memo-group');
  if(group&&!group.contains(e.relatedTarget)){
    group.classList.remove('group-drag-over-top','group-drag-over-bottom');
  }
}
function memoGroupDrop(e, targetCat){
  e.preventDefault();
  e.stopPropagation();
  const group=e.currentTarget.closest('.memo-group');
  const isTop=group.classList.contains('group-drag-over-top');
  group.classList.remove('group-drag-over-top','group-drag-over-bottom');
  const fromCat=_memoGroupDragCat;
  _memoGroupDragCat=null;
  if(!fromCat||fromCat===targetCat) return;

  // 현재 렌더된 그룹 순서 파악
  const allGroups=[...document.querySelectorAll('.memo-group')].map(g=>g.dataset.cat);
  const fromIdx=allGroups.indexOf(fromCat);
  let toIdx=allGroups.indexOf(targetCat);
  if(fromIdx<0||toIdx<0) return;
  allGroups.splice(fromIdx,1);
  if(!isTop && toIdx>=fromIdx) toIdx=allGroups.indexOf(targetCat)+1;
  else toIdx=allGroups.indexOf(targetCat);
  allGroups.splice(toIdx<0?allGroups.length:toIdx,0,fromCat);

  _memoGroupOrder=allGroups;
  try{ localStorage.setItem('memoGroupOrder', JSON.stringify(allGroups)); }catch(err){}
  renderMemos();
}

/* ── Memo Select Mode ── */
function toggleMemoSelectMode(){
  _memoSelectMode=!_memoSelectMode;
  _memoSelected.clear();
  const btn=document.getElementById('memo-select-btn');
  const bar=document.getElementById('memo-bulk-bar');
  if(btn) btn.style.background=_memoSelectMode?'var(--accent-bg)':'var(--bg3)';
  if(btn) btn.style.color=_memoSelectMode?'var(--accent2)':'var(--text2)';
  if(bar) bar.style.display=_memoSelectMode?'flex':'none';
  renderMemos();
}
function memoCardClick(e,memoId){
  if(_memoSelectMode){
    e.stopPropagation();
    if(_memoSelected.has(memoId)) _memoSelected.delete(memoId);
    else _memoSelected.add(memoId);
    const count=document.getElementById('memo-select-count');
    if(count) count.textContent=_memoSelected.size+'개 선택됨';
    // 해당 카드만 시각 업데이트
    const card=document.querySelector(`.memo-card[data-memo-id="${memoId}"]`);
    if(card){
      const isSel=_memoSelected.has(memoId);
      card.classList.toggle('memo-card-selected',isSel);
      const chk=card.querySelector('div[style*="position:absolute"]');
      if(chk){chk.style.borderColor=isSel?'var(--accent)':'var(--border2)';chk.style.background=isSel?'var(--accent)':'transparent';chk.textContent=isSel?'✓':'';}
    }
  } else {
    openMemoModal(memoId);
  }
}
function selectAllMemos(){
  document.querySelectorAll('.memo-card[data-memo-id]').forEach(card=>{
    const id=Number(card.dataset.memoId);
    _memoSelected.add(id);
  });
  const count=document.getElementById('memo-select-count');
  if(count) count.textContent=_memoSelected.size+'개 선택됨';
  renderMemos();
}
async function bulkDeleteMemos(){
  if(_memoSelected.size===0) return showToast('삭제할 메모를 선택해주세요.',true);
  if(!confirm(`선택한 ${_memoSelected.size}개 메모를 삭제할까요?`)) return;
  const ids=[..._memoSelected];
  const{error}=await sb.from('memos').delete().in('id',ids);
  if(error) return showToast('삭제 오류: '+error.message,true);
  memos=memos.filter(m=>!ids.includes(m.id));
  _memoSelected.clear();
  toggleMemoSelectMode();
  showToast(`${ids.length}개 메모가 삭제됐어요.`);
}

/* ── Memo Card Drag (group 이동 + 그룹 내 순서) ── */
let _memoDragId=null;
let _memoDragCat=null;
let _memoSelectMode=false;
const _memoSelected=new Set();
let _memoGroupOrder=null; // null = 저장된 순서 없음

function memoCardDragStart(e,memoId,cat){
  if(_memoSelectMode){e.preventDefault();return;}
  _memoDragId=memoId;
  _memoDragCat=cat;
  e.dataTransfer.effectAllowed='move';
  e.dataTransfer.setData('text/plain',String(memoId));
  e.currentTarget.classList.add('dragging');
}
function memoCardDragOver(e){
  e.preventDefault();
  e.stopPropagation();
  e.dataTransfer.dropEffect='move';
  const card=e.currentTarget;
  const rect=card.getBoundingClientRect();
  const mid=rect.top+rect.height/2;
  card.classList.remove('card-drag-over-top','card-drag-over-bottom');
  if(e.clientY<mid) card.classList.add('card-drag-over-top');
  else card.classList.add('card-drag-over-bottom');
}
function memoCardDragLeave(e){
  e.currentTarget.classList.remove('card-drag-over-top','card-drag-over-bottom');
}
async function memoCardDrop(e,targetMemoId,targetCat){
  e.preventDefault();
  e.stopPropagation();
  const card=e.currentTarget;
  const isTop=card.classList.contains('card-drag-over-top');
  card.classList.remove('card-drag-over-top','card-drag-over-bottom');
  document.querySelectorAll('.memo-group').forEach(g=>g.classList.remove('drag-over'));
  const fromId=_memoDragId;
  const fromCat=_memoDragCat;
  _memoDragId=null;_memoDragCat=null;
  if(!fromId||fromId===targetMemoId) return;

  if(fromCat===targetCat){
    const groupMemos=memos.filter(m=>(m.title||'기타')===targetCat)
      .sort((a,b)=>(a.sort_order!=null?a.sort_order:99999)-(b.sort_order!=null?b.sort_order:99999));
    const fromIdx=groupMemos.findIndex(m=>N(m.id)===N(fromId));
    let toIdx=groupMemos.findIndex(m=>N(m.id)===N(targetMemoId));
    if(fromIdx<0||toIdx<0||fromIdx===toIdx) return;
    // 하단 절반에 드롭하면 target 다음에 삽입
    if(!isTop && toIdx>=fromIdx) toIdx=toIdx; // already after
    else if(!isTop && toIdx<fromIdx) toIdx=toIdx+1;
    else if(isTop && toIdx>fromIdx) toIdx=toIdx-1;
    const [moved]=groupMemos.splice(fromIdx,1);
    groupMemos.splice(toIdx,0,moved);
    groupMemos.forEach((m,i)=>{ m.sort_order=i+1; });
    await Promise.all(groupMemos.map(m=>sb.from('memos').update({sort_order:m.sort_order}).eq('id',N(m.id))));
    renderMemos();
  } else {
    const{error}=await sb.from('memos').update({title:targetCat}).eq('id',N(fromId));
    if(error){showToast('이동 오류: '+error.message,true);return;}
    const m=memos.find(x=>N(x.id)===N(fromId));
    if(m) m.title=targetCat;
    showToast(`"${targetCat}"으로 이동됐어요.`);
    renderMemos();
  }
}
function memoDragEnd(e){
  e.currentTarget.classList.remove('dragging');
  document.querySelectorAll('.memo-card').forEach(c=>c.classList.remove('card-drag-over-top','card-drag-over-bottom'));
  document.querySelectorAll('.memo-group').forEach(g=>g.classList.remove('drag-over'));
}
function memoDragOver(e){e.preventDefault();const g=e.currentTarget.closest('.memo-group');if(g)g.classList.add('drag-over');}
function memoDragLeave(e){const g=e.currentTarget.closest('.memo-group');if(g&&!g.contains(e.relatedTarget))g.classList.remove('drag-over');}
async function memoDrop(e,targetCat){
  e.preventDefault();
  document.querySelectorAll('.memo-group').forEach(g=>g.classList.remove('drag-over'));
  const memoId=_memoDragId||Number(e.dataTransfer.getData('text/plain'));
  _memoDragId=null;_memoDragCat=null;
  if(!memoId) return;
  const m=memos.find(x=>N(x.id)===N(memoId));
  if(!m||m.title===targetCat) return;
  const{error}=await sb.from('memos').update({title:targetCat}).eq('id',N(memoId));
  if(error){showToast('이동 오류: '+error.message,true);return;}
  m.title=targetCat;
  showToast(`"${targetCat}"으로 이동됐어요.`);
  renderMemos();
}

/* ── Text Color Functions ── */
/* ── Text Color with Selection Save/Restore ── */
let _savedMemoRange=null;

function saveMemoSelection(){
  const sel=window.getSelection();
  if(sel&&sel.rangeCount>0&&!sel.isCollapsed){
    _savedMemoRange=sel.getRangeAt(0).cloneRange();
  }
}
function restoreMemoSelection(){
  const editor=document.getElementById('memo-content-editor');
  if(!_savedMemoRange||!editor) return false;
  editor.focus();
  const sel=window.getSelection();
  sel.removeAllRanges();
  sel.addRange(_savedMemoRange);
  return true;
}
function applyTxtColor(color){
  if(!restoreMemoSelection()) return;
  document.execCommand('foreColor', false, color);
  _savedMemoRange=null;
  // 적용 후 선택 유지 (시각적 확인용)
}
function removeTxtColor(){
  if(!restoreMemoSelection()) return;
  document.execCommand('removeFormat', false, null);
  _savedMemoRange=null;
}
function initMemoColorPicker(){
  document.querySelectorAll('.txt-color-btn').forEach(el=>{
    el.addEventListener('mousedown',(e)=>{ e.preventDefault(); });
    el.addEventListener('click',(e)=>{
      e.preventDefault();
      applyTxtColor(el.dataset.color);
    });
  });
  // 적용 버튼도 mousedown preventDefault
  document.querySelectorAll('#memo-editor-toolbar button').forEach(btn=>{
    btn.addEventListener('mousedown',(e)=>e.preventDefault());
  });
  // color picker: change 이벤트 전에 selection 저장
  const customInput=document.getElementById('memo-txt-color-custom');
  if(customInput){
    customInput.addEventListener('mousedown',()=>saveMemoSelection());
    customInput.addEventListener('change',()=>applyTxtColor(customInput.value));
  }
  // 에디터에서 선택 변경 시 자동 저장
  const editor=document.getElementById('memo-content-editor');
  if(editor){
    editor.addEventListener('mouseup',saveMemoSelection);
    editor.addEventListener('keyup',(e)=>{ if(e.shiftKey) saveMemoSelection(); });
  }
}

function openMemoModal(editId, defaultCategory, defaultTaskId, defaultSubId){
  document.getElementById('memo-modal-title').textContent=editId?'메모 수정':'메모 추가';
  document.getElementById('memo-edit-id').value=editId||'';
  document.getElementById('memo-title-input').value=defaultCategory||'';
  document.getElementById('memo-content-input').value='';
  const editor=document.getElementById('memo-content-editor');
  if(editor) editor.innerHTML='';
  document.getElementById('memo-tags-input').value='';
  document.getElementById('memo-del-btn').style.display='none';

  // 업무 셀렉트 채우기
  const taskSel=document.getElementById('memo-task-id');
  const allTasks=window._allTasksCache||tasks;
  const seen=new Set();
  const uniqueTasks=allTasks.filter(t=>{ const k=t.task_key||t.name; if(seen.has(k)) return false; seen.add(k); return true; }).sort((a,b)=>(a.name||'').localeCompare(b.name||'','ko'));
  taskSel.innerHTML='<option value="">업무 선택 안 함</option>'+uniqueTasks.map(t=>`<option value="${t.id}">${t.name}</option>`).join('');
  document.getElementById('memo-sub-id').innerHTML='<option value="">세부태스크 선택 안 함</option>';

  if(editId){
    const m=memos.find(x=>N(x.id)===N(editId));
    if(m){
      document.getElementById('memo-title-input').value=m.title||'';
      // HTML 그대로 editor에 로드 (색상 span 보존)
      const ed=document.getElementById('memo-content-editor');
      if(ed) ed.innerHTML=m.content||'';
      document.getElementById('memo-tags-input').value=m.tags||'';
      if(m.task_id){ taskSel.value=m.task_id; populateMemoSubs(m.task_id, m.sub_id); }
      document.getElementById('memo-del-btn').style.display='inline-flex';
    }
  } else if(defaultTaskId){
    taskSel.value=defaultTaskId;
    populateMemoSubs(defaultTaskId, defaultSubId||null);
    if(defaultSubId) setTimeout(()=>{document.getElementById('memo-sub-id').value=defaultSubId;},50);
  }
  openModal('memo');
}

function populateMemoSubs(taskId, selectedSubId){
  const subSel=document.getElementById('memo-sub-id');
  const subs=subtasks.filter(s=>N(s.task_id)===N(taskId));
  subSel.innerHTML='<option value="">세부태스크 선택 안 함</option>'+subs.map(s=>`<option value="${s.id}">${s.name}</option>`).join('');
  if(selectedSubId) subSel.value=selectedSubId;
}
function onMemoTaskChange(){
  const taskId=document.getElementById('memo-task-id').value;
  document.getElementById('memo-sub-id').innerHTML='<option value="">세부태스크 선택 안 함</option>';
  if(taskId) populateMemoSubs(taskId, null);
}

async function saveMemo(){
  const editId=document.getElementById('memo-edit-id').value;
  const title=document.getElementById('memo-title-input').value.trim();
  if(!title) return showToast('제목을 입력해주세요.',true);
  const editor=document.getElementById('memo-content-editor');
  const content=editor?editor.innerHTML.trim():'';
  const tags=document.getElementById('memo-tags-input').value.trim();
  const taskId=document.getElementById('memo-task-id').value||null;
  const subId=document.getElementById('memo-sub-id').value||null;
  const p={title,content,tags,task_id:taskId?N(taskId):null,sub_id:subId?N(subId):null};
  if(editId){
    const{error}=await sb.from('memos').update(p).eq('id',N(editId));
    if(error) return showToast('수정 오류: '+error.message,true);
  }else{
    const{error}=await sb.from('memos').insert([p]);
    if(error) return showToast('저장 오류: '+error.message,true);
  }
  closeModal('memo');
  showToast(editId?'메모가 수정됐어요.':'메모가 저장됐어요.',false);
  const{data}=await sb.from('memos').select('*').order('created_at',{ascending:false});
  memos=data||[];
  renderMemos();
}

async function deleteMemo(){
  const editId=document.getElementById('memo-edit-id').value;
  if(!editId||!confirm('메모를 삭제할까요?')) return;
  const{error}=await sb.from('memos').delete().eq('id',N(editId));
  if(error) return showToast('삭제 오류: '+error.message,true);
  closeModal('memo');
  showToast('메모가 삭제됐어요.',false);
  const{data}=await sb.from('memos').select('*').order('created_at',{ascending:false});
  memos=data||[];
  renderMemos();
}

/* ── Template Page ── */
let _tmplTab='전체', _tmplTaskKey=null;

function setTmplTab(tab){
  _tmplTab=tab;
  _tmplTaskKey=null;
  document.querySelectorAll('.tmpl-tab').forEach(b=>b.classList.toggle('active',b.textContent===tab));
  renderTmplList();
  document.getElementById('tmpl-detail').innerHTML='<div style="color:var(--text3);text-align:center;padding:60px 0;font-size:0.85em;">업무를 선택해주세요</div>';
}

function renderTmplList(){
  // task_key 기준으로 중복 제거한 업무 목록
  const allTasks=window._allTasksCache||tasks;
  const seen=new Set();
  const unique=allTasks.filter(t=>{
    if(_tmplTab!=='전체'&&t.task_type!==_tmplTab) return false;
    const key=t.task_key||t.name;
    if(seen.has(key)) return false;
    seen.add(key); return true;
  }).sort((a,b)=>(a.task_key||a.name).localeCompare(b.task_key||b.name,'ko'));

  const typeColors={상시:'blue',월간:'accent2',분기:'teal',반기:'pink',연간:'red'};
  const list=document.getElementById('tmpl-list');
  if(!unique.length){list.innerHTML='<div style="padding:20px;color:var(--text3);text-align:center;font-size:0.85em;">업무가 없어요</div>';return;}
  list.innerHTML=unique.map(t=>{
    const key=t.task_key||t.name;
    const c=typeColors[t.task_type||'월간']||'accent2';
    return `<div class="tmpl-item${_tmplTaskKey===key?' active':''}" onclick="selectTmplTask('${key.replace(/'/g,"\\'")}')">
      <span style="font-size:0.7em;padding:1px 6px;border-radius:3px;background:var(--${c}-bg);color:var(--${c});flex-shrink:0">${t.task_type||'월간'}</span>
      <span style="font-size:0.85em;color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${key}</span>
    </div>`;
  }).join('');
}

function selectTmplTask(taskKey){
  _tmplTaskKey=taskKey;
  renderTmplList();
  renderTmplDetail(taskKey);
}

function renderTmplDetail(taskKey){
  const allTasks=window._allTasksCache||tasks;
  const rep=allTasks.filter(t=>(t.task_key||t.name)===taskKey).sort((a,b)=>b.year*100+b.month-(a.year*100+a.month))[0];
  if(!rep){document.getElementById('tmpl-detail').innerHTML='<div style="color:var(--text3);text-align:center;padding:40px">업무를 찾을 수 없어요</div>';return;}

  let tmplSubs=taskTemplates.filter(t=>t.task_key===taskKey).sort((a,b)=>(a.sort_order||a.id)-(b.sort_order||b.id));

  // task_templates에 없으면 기존 subtasks에서 이름 중복 제거해서 보여줌 (읽기 전용 미리보기)

    const subMap={};

      if(!subMap[s.name]) subMap[s.name]={days:[]};
      if(s.due_date){
        const d=new Date(s.due_date);
        subMap[s.name].days.push(d.getDate());
      }

    tmplSubs=Object.entries(subMap).map(([name,v],i)=>{
      // 가장 자주 쓰인 날짜를 기본값으로
      const dayCount={};
      v.days.forEach(d=>{dayCount[d]=(dayCount[d]||0)+1;});
      const defaultDay=v.days.length?parseInt(Object.entries(dayCount).sort((a,b)=>b[1]-a[1])[0][0]):null;
      return {id:'preview',sub_name:name,default_day:defaultDay,sort_order:i+1,_preview:true};

    const selected=(y===nextYear&&m===nextMonth)?'selected':'';
    return `<option value="${y}-${m}" ${selected}>${y}년 ${m}월</option>`;

      <span style="font-size:0.72em;padding:2px 8px;border-radius:4px;background:var(--${c}-bg);color:var(--${c})">${rep.task_type||'월간'}</span>

    <!-- 일괄 날짜 변경 -->

      <div style="font-size:0.85em;color:var(--text3);margin-bottom:8px;font-weight:500;">📅 날짜 일괄 변경</div>
      <div style="display:flex;flex-wrap:wrap;gap:8px;align-items:center;">
        ${usedDays.map(day=>`
          <div style="display:flex;align-items:center;gap:4px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:4px 8px;">
            <span style="font-size:0.85em;color:var(--text2)">${day}일 →</span>
            <input type="number" id="bulk-day-from-${day}" value="${day}" min="1" max="31"
              style="width:3em;background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:2px 4px;color:var(--text);font-size:0.85em;text-align:center;">
            <span style="font-size:0.8em;color:var(--text3)">일</span>
            <button onclick="bulkChangeDay('${taskKey.replace(/'/g,"\\'")}',${day})" 
              style="background:var(--accent-bg);color:var(--accent2);border:1px solid var(--accent);border-radius:4px;padding:2px 8px;cursor:pointer;font-size:0.8em;font-family:var(--sans);">변경</button>
          </div>`).join('')}
      </div>

    <!-- 하위태스크 템플릿 목록 -->
    <div style="margin-bottom:20px;">
      <div style="font-size:0.85em;color:var(--text3);margin-bottom:8px;font-weight:500;">하위 태스크 템플릿
        ${tmplSubs.length&&tmplSubs[0]._preview?`<span style="font-size:0.8em;color:var(--amber);font-weight:400;margin-left:6px;">기존 업무에서 불러온 미리보기 — 날짜 입력 후 저장하세요</span>`:''}
      </div>
      <div id="tmpl-sub-list">
        ${tmplSubs.length?tmplSubs.map((s,i)=>`
          <div class="tmpl-sub-row" id="tmpl-sub-${i}" data-id="${s._preview?'new':s.id}" draggable="true"
            ondragstart="tmplSubDragStart(event,${i})"
            ondragend="tmplSubDragEnd(event)"
            ondragover="tmplSubDragOver(event)"
            ondragleave="tmplSubDragLeave(event)"
            ondrop="tmplSubDrop(event,${i})">
            <span class="tmpl-drag-handle" title="드래그하여 순서 변경">⠿</span>
            <span class="tmpl-sub-num" style="color:var(--text3);font-size:0.82em;width:1.4em;text-align:center;flex-shrink:0">${i+1}</span>
            <input value="${s.sub_name}" id="tmpl-sub-input-${i}"
              style="flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:0.3em 0.6em;color:var(--text);font-size:0.85em;font-family:var(--sans);"
              onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='var(--border)'">
            <input type="number" value="${s.default_day||''}" id="tmpl-sub-day-${i}" placeholder="일" min="1" max="31"

            <span style="font-size:0.8em;color:var(--text3);flex-shrink:0">일</span>
            ${s._preview?'':`<button onclick="removeTmplSub(${s.id},'${taskKey.replace(/'/g,"\\'")}',${i})"

          </div>`).join('')
          :'<div style="color:var(--text3);font-size:0.85em;padding:8px 0">템플릿이 없어요. 아래에서 추가해주세요.</div>'}
      </div>
      <div style="display:flex;gap:6px;margin-top:8px;">

    <div style="display:flex;gap:8px;flex-wrap:wrap;padding-top:16px;border-top:1px solid var(--border);">

/* ── Template Sub-row Drag-to-reorder ── */
let _tmplDragFromIdx=null;
function tmplSubDragStart(e,idx){
  _tmplDragFromIdx=idx;
  e.dataTransfer.effectAllowed='move';
  e.currentTarget.classList.add('dragging');
}
function tmplSubDragEnd(e){
  e.currentTarget.classList.remove('dragging');
  document.querySelectorAll('.tmpl-sub-row').forEach(r=>r.classList.remove('drag-over'));
}
function tmplSubDragOver(e){
  e.preventDefault();
  e.dataTransfer.dropEffect='move';
  e.currentTarget.classList.add('drag-over');
}
function tmplSubDragLeave(e){
  e.currentTarget.classList.remove('drag-over');
}
function tmplSubDrop(e, toIdx){
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  const fromIdx=_tmplDragFromIdx;
  _tmplDragFromIdx=null;
  if(fromIdx===null||fromIdx===toIdx) return;
  const list=document.getElementById('tmpl-sub-list');
  const rows=[...list.querySelectorAll('.tmpl-sub-row')];
  const draggedRow=rows[fromIdx];
  if(!draggedRow) return;
  // Re-insert
  if(fromIdx<toIdx) list.insertBefore(draggedRow, rows[toIdx].nextSibling);
  else list.insertBefore(draggedRow, rows[toIdx]);
  // Renumber: update num spans and IDs
  const newRows=[...list.querySelectorAll('.tmpl-sub-row')];
  newRows.forEach((row,i)=>{
    row.id='tmpl-sub-'+i;
    row.ondragstart=(ev)=>tmplSubDragStart(ev,i);
    row.ondrop=(ev)=>tmplSubDrop(ev,i);
    const numEl=row.querySelector('.tmpl-sub-num');
    if(numEl) numEl.textContent=i+1;
    const inp=row.querySelector('input[type="text"],input:not([type])');
    if(inp) inp.id='tmpl-sub-input-'+i;
    const dayInp=row.querySelector('input[type="number"]');
    if(dayInp) dayInp.id='tmpl-sub-day-'+i;
  });
}
function getTmplSubNames(){
  const rows=document.querySelectorAll('#tmpl-sub-list .tmpl-sub-row');
  return [...rows].map((_,i)=>document.getElementById('tmpl-sub-input-'+i)?.value.trim()).filter(Boolean);
}

async function removeTmplSub(id,taskKey){
  await sb.from('task_templates').delete().eq('id',id);
  await loadAll();renderTmplDetail(taskKey);showToast('항목을 삭제했어요.',false);
}

async function saveTmplSubsToDB(taskKey){
  const rows=document.querySelectorAll('#tmpl-sub-list .tmpl-sub-row');
  const items=[...rows].map((row,i)=>{
    const name=document.getElementById('tmpl-sub-input-'+i)?.value.trim();
    const day=parseInt(document.getElementById('tmpl-sub-day-'+i)?.value)||null;
    return {id:row.dataset.id,name,day,sort_order:i+1};
  }).filter(x=>x.name);
  for(const item of items){
    if(item.id==='new'||!item.id){
      await sb.from('task_templates').insert([{task_key:taskKey,sub_name:item.name,default_day:item.day,sort_order:item.sort_order}]);
    } else {
      await sb.from('task_templates').update({sub_name:item.name,default_day:item.day,sort_order:item.sort_order}).eq('id',N(item.id));
    }
  }
  await loadAll();showToast('템플릿을 저장했어요.',false);renderTmplDetail(taskKey);
}

async function bulkChangeDay(taskKey,fromDay){
  const toDay=parseInt(document.getElementById('bulk-day-from-'+fromDay)?.value);
  if(!toDay||toDay<1||toDay>31) return showToast('올바른 날짜를 입력해주세요.',true);
  if(fromDay===toDay) return;
  if(!confirm(`${taskKey}의 미완료 하위태스크 ${fromDay}일 → ${toDay}일로 일괄 변경할까요?\n(주말이면 자동 조정)`)) return;
  const allTasks=window._allTasksCache||tasks;
  const relatedTaskIds=allTasks.filter(t=>(t.task_key||t.name)===taskKey&&t.status!=='완료').map(t=>N(t.id));
  let changed=0;
  for(const tid of relatedTaskIds){
    const t=allTasks.find(x=>N(x.id)===tid);if(!t)continue;
    const subs=subtasks.filter(s=>N(s.task_id)===tid&&!s.done&&s.due_date);
    for(const s of subs){
      const d=new Date(s.due_date);
      if(d.getDate()!==fromDay) continue;
      let nd=new Date(d.getFullYear(),d.getMonth(),toDay);
      const dow=nd.getDay();
      if(dow===6) nd=new Date(nd.getFullYear(),nd.getMonth(),toDay-1);
      else if(dow===0) nd=new Date(nd.getFullYear(),nd.getMonth(),toDay+1);
      const newStr=`${nd.getFullYear()}-${String(nd.getMonth()+1).padStart(2,'0')}-${String(nd.getDate()).padStart(2,'0')}`;
      await sb.from('subtasks').update({due_date:newStr}).eq('id',s.id);
      changed++;
    }
  }
  await sb.from('task_templates').update({default_day:toDay}).eq('task_key',taskKey).eq('default_day',fromDay);
  await loadAll();showToast(`${changed}개 하위태스크를 ${toDay}일로 변경했어요.`,false);renderTmplDetail(taskKey);
}

async function applyTmplToTasks(taskKey,taskIds,mode){
  const tmplSubs=taskTemplates.filter(t=>t.task_key===taskKey).sort((a,b)=>(a.sort_order||a.id)-(b.sort_order||b.id));
  if(!tmplSubs.length) return showToast('템플릿을 먼저 저장해주세요.',true);
  if(!confirm(`${mode==='all'?'전체':'미완료'} 업무에 템플릿을 일괄 반영할까요?\n※ 완료된 하위태스크는 유지됩니다.`)) return;
  const allTasks=window._allTasksCache||tasks;
  let updated=0;
  for(const tid of taskIds){
    const t=allTasks.find(x=>N(x.id)===N(tid));if(!t)continue;
    if(mode==='incomplete'&&t.status==='완료') continue;
    const existingSubs=subtasks.filter(s=>N(s.task_id)===N(tid));
    const doneSubs=existingSubs.filter(s=>s.done);
    for(const s of existingSubs.filter(s=>!s.done)) await sb.from('subtasks').delete().eq('id',s.id);
    const newRows=tmplSubs.filter(ts=>!doneSubs.find(s=>s.name===ts.sub_name)).map(ts=>{
      let due_date=null;
      if(ts.default_day&&t.year&&t.month){
        let d=new Date(t.year,t.month-1,ts.default_day);
        const dow=d.getDay();
        if(dow===6) d=new Date(t.year,t.month-1,ts.default_day-1);
        else if(dow===0) d=new Date(t.year,t.month-1,ts.default_day+1);
        due_date=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      }
      return {task_id:N(tid),name:ts.sub_name,done:false,due_date};
    });
    if(newRows.length) await sb.from('subtasks').insert(newRows);
    updated++;
  }
  await loadAll();showToast(`${updated}개 업무에 반영됐어요.`,false);renderTmplDetail(taskKey);
}

async function saveTmplSubs(taskKey,taskIds,mode){return applyTmplToTasks(taskKey,taskIds,mode);}

async function copyTmplToMonth(taskKey,repTaskId){
  const sel=document.getElementById('tmpl-copy-month').value.split('-');
  const nextY=parseInt(sel[0]),nextM=parseInt(sel[1]);
  const t=(window._allTasksCache||tasks).find(x=>N(x.id)===N(repTaskId));if(!t)return;
  const tmplSubs=taskTemplates.filter(ts=>ts.task_key===taskKey).sort((a,b)=>(a.sort_order||a.id)-(b.sort_order||b.id));
  const subsWithDates=tmplSubs.map(ts=>{
    let due_date=null;
    if(ts.default_day){
      let d=new Date(nextY,nextM-1,ts.default_day);
      const dow=d.getDay();
      if(dow===6) d=new Date(nextY,nextM-1,ts.default_day-1);
      else if(dow===0) d=new Date(nextY,nextM-1,ts.default_day+1);
      due_date=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }
    return {name:ts.sub_name,done:false,due_date};
  });
  await doCopyTask(t,repTaskId,subsWithDates,nextY,nextM);
  showToast(`${nextY}년 ${nextM}월에 복사됐어요.`,false);await loadAll();
}

function showPage(page){
  const mainWrap=document.getElementById('main-wrapper');
  const noticePage=document.getElementById('page-notice');
  const memoPage=document.getElementById('page-memo');
  const templatePage=document.getElementById('page-template');
  if(mainWrap) mainWrap.style.display=page==='main'?'':'none';
  if(noticePage){noticePage.style.display=page==='notice'?'block':'none';noticePage.style.pointerEvents=page==='notice'?'auto':'none';}
  if(memoPage){memoPage.style.display=page==='memo'?'block':'none';memoPage.style.pointerEvents=page==='memo'?'auto':'none';}
  if(templatePage){templatePage.style.display=page==='template'?'block':'none';templatePage.style.pointerEvents=page==='template'?'auto':'none';}
  if(page==='notice') loadNotices();
  if(page==='memo') renderMemos();
  if(page==='template'){renderTmplList();}
  location.hash=page==='notice'?'notice':page==='memo'?'memo':page==='template'?'template':'';
}

/* ── Task Detail Modal ── */
let curModalTaskId=null;

function openTaskDetail(taskId){
  curModalTaskId=N(taskId);
  renderTaskDetailModal(curModalTaskId);
  openModal('taskdetail');
}

function renderTaskDetailModal(taskId){
  const t=tasks.find(x=>N(x.id)===N(taskId));
  if(!t)return;
  const tc=typeColor(t.task_type||'월간');
  const sc={진행중:'blue',완료:'green',예정:'amber',지연:'red'}[t.status]||'amber';
  const subs=getSubs(taskId);
  const prog=getProg(taskId);
  const progress=prog!==null?prog:(t.progress||0);
  const imgs=images.filter(i=>N(i.task_id)===N(taskId));
  const taskKey=t.task_key||t.name;
  const jours=journals.filter(j=>j.task_key===taskKey||N(j.task_id)===N(taskId));

  document.getElementById('td-header').innerHTML=`
    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:0.5em;margin-bottom:0.5em;">

        <span style="font-size:1.15em;font-weight:700;color:var(--text)">${t.name}</span>
        <span class="badge ${tc}">${t.task_type||'월간'}</span>
        <span class="badge ${sc}">${t.status}</span>
      </div>
      <div style="display:flex;gap:0.3em;flex-shrink:0;margin-left:0.5em;">
        <button class="btn" onclick="copyTask(${taskId});closeModal('taskdetail')" style="background:var(--teal-bg);color:var(--teal);border:1px solid var(--teal);font-size:0.78em;padding:0.3em 0.7em;">⊕ 복사</button>
        <button class="btn" onclick="closeModal('taskdetail');editTask(${taskId})" style="background:var(--accent-bg);color:var(--accent2);border:1px solid var(--accent);font-size:0.78em;padding:0.3em 0.7em;">✏ 수정</button>
        <button class="btn" onclick="deleteTaskFromModal(${taskId})" style="background:var(--red-bg);color:var(--red);border:1px solid var(--red-bg);font-size:0.78em;padding:0.3em 0.7em;">✕ 삭제</button>
        <button class="btn bcnl" onclick="closeModal('taskdetail')" style="font-size:0.78em;padding:0.3em 0.7em;">닫기</button>
      </div>
    </div>`

  let html='';
  if(t.memo) html+=`<div style="font-size:0.9em;color:var(--text3);margin-bottom:0.8em">${t.memo}</div>`;
  if(t.link) html+=`<div style="font-size:0.85em;margin-bottom:0.8em"><a href="${t.link}" target="_blank" style="color:var(--accent2);text-decoration:none">🔗 관련 링크</a></div>`;

  html+=`<div class="plabel"><span>진도율</span><span>${progress}%</span></div>
  <div class="pbg" style="margin-bottom:0.8em"><div class="pfill" style="width:${progress}%"></div></div>`;

  html+=`<div class="dstitle" style="margin-bottom:0.5em">하위 태스크</div>
  <div class="stlist" id="td-stlist">${subs.map(s=>{
    const today=new Date().toISOString().slice(0,10);
    const dateCls=s.due_date?(s.due_date<today?'overdue':s.due_date===today?'today':''):'';
    const dateLabel=s.due_date?`<span class="stdate ${dateCls}">${s.due_date.slice(5).replace('-','/')}</span>`:'';
    return `<div class="stitem">
      <button class="stchk${s.done?' checked':''}" onclick="tdToggleSub(${s.id},${s.done},${taskId})"></button>
      <span class="stname${s.done?' done':''}">${s.name}</span>
      ${dateLabel}
      <button class="icobtn" onclick="openEditSubModal(${s.id},'modal',${taskId})" title="수정">✏</button>
      <button class="icobtn del" onclick="tdDeleteSub(${s.id},${taskId})">✕</button>
    </div>`;
  }).join('')}</div>
  <div class="stadd" style="margin-bottom:1em">
    <input id="td-si-${taskId}" placeholder="하위 태스크 추가..." onkeydown="if(event.key==='Enter')tdAddSub(${taskId})">
    <div style="position:relative;flex-shrink:0;">
      <button class="date-pick-btn" id="td-si-date-label-${taskId}" onclick="document.getElementById('td-si-date-${taskId}').showPicker()">📅 날짜</button>
      <input type="date" id="td-si-date-${taskId}" style="position:absolute;opacity:0;width:0;height:0;pointer-events:none;" onchange="document.getElementById('td-si-date-label-${taskId}').textContent='📅 '+(this.value?this.value.slice(5).replace('-','/'):'날짜')">
    </div>
    <button class="add-btn" onclick="tdAddSub(${taskId})">추가</button>
  </div>`;

  if(imgs.length){
    html+=`<div class="dstitle" style="margin-bottom:0.5em">첨부 이미지</div>
    <div class="imgrid" style="margin-bottom:1em">${imgs.map(img=>`<div class="imgcard" onclick="openLB('${img.url}','${(img.caption||'').replace(/'/g,"\'")}')">
      <img src="${img.url}" style="width:100%;height:90px;object-fit:cover;display:block">
      <div class="imgcap">${img.caption||'설명 없음'}</div>
    </div>`).join('')}</div>`;
  }
  html+=`<div class="upzone" onclick="document.getElementById('td-up-${taskId}').click()">
    <input type="file" id="td-up-${taskId}" accept="image/*" onchange="prepUpload(event,${taskId})">
    <div class="upzone-t">클릭하여 <span>이미지 업로드</span></div>
  </div>`;

  html+=`<div class="dstitle" style="margin-top:1em;margin-bottom:0.5em">📝 업무 일지 <span style="font-size:0.75em;color:var(--text3);font-weight:400">(업무명 '${taskKey}' 전체 기간 공유)</span></div>
  <div class="jlist">${jours.length?jours.map(j=>`<div class="jitem">
    <div class="jdate">${j.date||''}</div>
    <div class="jtext">${j.text}</div>
    <div class="jacts">
      <button class="icobtn" onclick="openJEdit(${j.id},'${(j.date||'').replace(/'/g,"\'")}',\`${j.text.replace(/`/g,'\`')}\`)" title="수정">✏</button>
      <button class="icobtn del" onclick="delJournal(${j.id})" title="삭제">✕</button>
    </div>
  </div>`).join(''):`<div style="font-size:0.85em;color:var(--text3);padding:0.5em 0">아직 기록이 없어요.</div>`}</div>
  <div class="jadd">
    <div class="jadd-row"><input type="date" id="td-jd-${taskId}" value="${todayStr()}"></div>
    <textarea id="td-jt-${taskId}" placeholder="업무 진행 내용, 이슈, 결정사항 등을 자유롭게 기록하세요..."></textarea>
    <button onclick="tdAddJournal(${taskId},'${taskKey.replace(/'/g,"\'")}')">기록 저장</button>
    <div style="clear:both"></div>
  </div>`;

  document.getElementById('td-content').innerHTML=html;
}

async function deleteTaskFromModal(taskId){
  if(!confirm('업무를 삭제할까요?\n하위 태스크와 이미지도 함께 삭제됩니다.'))return;
  await sb.from('subtasks').delete().eq('task_id',taskId);
  await sb.from('images').delete().eq('task_id',taskId);
  await sb.from('tasks').delete().eq('id',taskId);
  closeModal('taskdetail');
  await loadAll();
}

function openEditSubModal(subId, from, taskId){
  const s=subtasks.find(x=>x.id===subId);if(!s)return;
  const existing=document.getElementById('modal-edit-sub');
  if(existing)existing.remove();

  const modal=document.createElement('div');
  modal.id='modal-edit-sub';
  modal.className='overlay open';
  modal.innerHTML=`
    <div class="modal" style="width:28em;">
      <div class="mtitle">하위 태스크 수정</div>
      <div class="fg">
        <label class="fl">태스크명</label>
        <input class="fi" id="edit-sub-name" value="${s.name.replace(/"/g,'&quot;')}" onkeydown="if(event.key==='Enter')saveEditSub(${subId},'${from}',${taskId||0})">
      </div>
      <div class="fg">
        <label class="fl">날짜</label>
        <input class="fi" id="edit-sub-date" type="date" value="${s.due_date||''}">
      </div>
      <div class="macts">
        <button class="btn bcnl" onclick="document.getElementById('modal-edit-sub').remove()">취소</button>
        <button class="btn bpri" onclick="saveEditSub(${subId},'${from}',${taskId||0})">저장</button>
      </div>
    </div>`;
  document.body.appendChild(modal);
  document.getElementById('edit-sub-name').focus();
}

async function saveEditSub(subId, from, taskId){
  const name=document.getElementById('edit-sub-name').value.trim();
  const due_date=document.getElementById('edit-sub-date').value||null;
  if(!name)return showToast('태스크명을 입력해주세요.',true);
  const{error}=await sb.from('subtasks').update({name,due_date}).eq('id',subId);
  if(error)return showToast('수정 오류: '+error.message,true);
  document.getElementById('modal-edit-sub').remove();
  await loadAll();
  if(from==='modal'&&taskId) renderTaskDetailModal(taskId);
}

async function tdToggleSub(subId,done,taskId){
  await sb.from('subtasks').update({done:!done}).eq('id',N(subId));
  await loadAll();
  await autoCompleteTask(taskId);
  renderTaskDetailModal(taskId);
}
async function tdDeleteSub(subId,taskId){
  if(!confirm('태스크를 삭제할까요?'))return;
  await sb.from('subtasks').delete().eq('id',N(subId));
  await loadAll();
  renderTaskDetailModal(taskId);
}
async function tdAddSub(taskId){
  const inp=document.getElementById('td-si-'+taskId);
  const dateInp=document.getElementById('td-si-date-'+taskId);
  const name=inp.value.trim();if(!name)return;
  const due_date=dateInp?dateInp.value||null:null;
  const{error}=await sb.from('subtasks').insert([{task_id:N(taskId),name,done:false,due_date}]);
  if(error){showToast('오류: '+error.message,true);return;}
  inp.value='';
  if(dateInp)dateInp.value='';
  const lbl=document.getElementById('td-si-date-label-'+taskId);
  if(lbl)lbl.textContent='📅 날짜';
  await loadAll();
  renderTaskDetailModal(taskId);
}
async function tdAddJournal(taskId,taskKey){
  const date=document.getElementById('td-jd-'+taskId).value;
  const text=document.getElementById('td-jt-'+taskId).value.trim();
  if(!text)return showToast('내용을 입력해주세요.',true);
  const{error}=await sb.from('history').insert([{task_id:N(taskId),task_key:taskKey,text,type:'journal',date}]);
  if(error){showToast('저장 오류: '+error.message,true);return;}
  document.getElementById('td-jt-'+taskId).value='';
  await loadAll();
  renderTaskDetailModal(taskId);
}

/* ── Search ── */

async function doSearch(query){
  // Search across ALL months/years - load all tasks matching name
  const{data:allTasks}=await sb.from('tasks').select('*').ilike('name','%'+query+'%').order('year',{ascending:false}).order('month',{ascending:false});
  const{data:allJournals}=await sb.from('history').select('*').ilike('task_key','%'+query+'%').order('date',{ascending:false});
  const{data:allSubs}=await sb.from('subtasks').select('*');
  const{data:allImgs}=await sb.from('images').select('*');

  if(!allTasks||!allTasks.length){
    document.getElementById('search-results').innerHTML=`<div style="color:var(--text3);font-size:1em;padding:20px 0;text-align:center">검색 결과가 없어요</div>`;
    document.getElementById('search-popup-title').textContent=`"${query}" 검색 결과`;
    openModal('search');return;
  }

  // Group by task_key (name)
  const groups={};
  allTasks.forEach(t=>{
    const key=t.task_key||t.name;
    if(!groups[key])groups[key]={name:key,tasks:[],journals:[],subtasks:[],images:[]};
    groups[key].tasks.push(t);
  });
  allJournals&&allJournals.forEach(j=>{
    const key=j.task_key||'';
    if(groups[key])groups[key].journals.push(j);
  });

  let html='';
  Object.values(groups).forEach(g=>{
    const taskIds=g.tasks.map(t=>t.id);
    const subs=allSubs?allSubs.filter(s=>taskIds.includes(N(s.task_id))):[];
    const imgs=allImgs?allImgs.filter(i=>taskIds.includes(N(i.task_id))):[];
    const doneSubs=subs.filter(s=>s.done).length;
    const progPct=subs.length?Math.round(doneSubs/subs.length*100):null;

    html+=`<div style="background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:14px;">
      <div style="font-size:1.15em;font-weight:500;margin-bottom:0.7em;color:var(--text)">${g.name}
        <span style="font-size:0.85em;color:var(--text3);font-weight:400;margin-left:0.5em">${g.tasks.length}개월 등록됨</span>
      </div>

      <!-- 등록 이력 -->
      <div style="font-size:0.85em;color:var(--text3);letter-spacing:0.04em;margin-bottom:0.4em">등록 이력</div>
      <div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px">
        ${g.tasks.map(t=>`<span style="font-size:0.9em;background:var(--bg);border:1px solid var(--border2);border-radius:5px;padding:0.3em 0.7em;color:var(--text2);cursor:pointer;font-size:0.95em" onclick="goToTask(${t.year},${t.month},${t.day})" title="해당 날짜로 이동">${t.year}년 ${t.month}월 ${t.day}일 · <span style="color:${{진행중:'var(--blue)',완료:'var(--green)',예정:'var(--amber)',지연:'var(--red)'}[t.status]||'var(--text2)'}">${t.status}</span> →</span>`).join('')}
      </div>

      ${progPct!==null?`
      <!-- 전체 진도 -->
      <div style="font-size:0.85em;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:5px">전체 진도율</div>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
        <div style="flex:1;background:var(--border);border-radius:99px;height:5px;overflow:hidden">
          <div style="width:${progPct}%;height:100%;background:var(--accent);border-radius:99px"></div>
        </div>
        <span style="font-size:1em;color:var(--accent2);font-family:var(--mono)">${progPct}%</span>
      </div>`:''}

      <!-- 월별 하위 태스크 + 이미지 -->
      ${g.tasks.map(t=>{
        const tSubs=allSubs?allSubs.filter(s=>N(s.task_id)===N(t.id)):[];
        const tImgs=allImgs?allImgs.filter(i=>N(i.task_id)===N(t.id)):[];
        const tDone=tSubs.filter(s=>s.done).length;
        if(!tSubs.length && !tImgs.length) return '';
        return `<div style="margin-bottom:12px;border-left:2px solid var(--border2);padding-left:10px;">
          <div style="font-size:0.9em;color:var(--accent2);font-family:var(--mono);margin-bottom:0.4em">${t.year}년 ${t.month}월</div>
          ${tSubs.length?`<div style="font-size:0.85em;color:var(--text3);letter-spacing:0.04em;margin-bottom:0.3em">하위 태스크 (${tDone}/${tSubs.length})</div>
          <div style="margin-bottom:8px">
            ${tSubs.map(s=>`<div style="display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:1px solid var(--border);font-size:1em;color:${s.done?'var(--text3)':'var(--text2)'}">
              <span style="color:${s.done?'var(--green)':'var(--border2)'};font-size:1em">${s.done?'✓':'○'}</span>
              <span style="${s.done?'text-decoration:line-through':''}">${s.name}</span>
            </div>`).join('')}
          </div>`:''}
          ${tImgs.length?`<div style="font-size:0.85em;color:var(--text3);letter-spacing:0.04em;margin-bottom:0.3em">첨부 이미지 (${tImgs.length})</div>
          <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:5px;">
            ${tImgs.map(img=>`<div style="border-radius:6px;overflow:hidden;border:1px solid var(--border);cursor:pointer" onclick="openLB('${img.url}','${(img.caption||'').replace(/'/g,"\'")}')">
              <img src="${img.url}" style="width:100%;height:65px;object-fit:cover;display:block">
              <div style="font-size:0.9em;color:var(--text3);padding:4px 8px;background:var(--bg3)">${img.caption||'설명 없음'}</div>
            </div>`).join('')}
          </div>`:''}
        </div>`;
      }).join('')}

      ${g.journals.length?`
      <!-- 업무 일지 -->
      <div style="font-size:0.85em;color:var(--text3);letter-spacing:0.04em;margin-bottom:0.4em">업무 일지 (${g.journals.length}건)</div>
      <div>
        ${g.journals.map(j=>`<div style="display:flex;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)">
          <span style="font-size:0.9em;color:var(--accent2);font-family:var(--mono);min-width:4.5em;margin-top:1px">${j.date||''}</span>
          <span style="font-size:1em;color:var(--text2);line-height:1.6">${j.text}</span>
        </div>`).join('')}
      </div>`:`<div style="font-size:1em;color:var(--text3)">업무 일지가 없어요</div>`}
    </div>`;
  });

  document.getElementById('search-popup-title').textContent=`"${query}" 검색 결과`;
  document.getElementById('search-results').innerHTML=html;
  openModal('search');
}

/* ── Task Type Suggestions ── */
function openTaskModalWithDate(){
  resetTaskModal();
  openModal('task');
  if(selDate){
    const y=curY, m=String(curM+1).padStart(2,'0'), d=String(selDate).padStart(2,'0');
    const dateStr=`${y}-${m}-${d}`;
    document.getElementById('k-date').value=dateStr;
    onDateTyped(dateStr);
  }
  // Re-trigger suggestions after reset
  const type=document.getElementById('k-type').value;
  if(type!=='상시') onTaskTypeChange(type);
}

async function onTaskTypeChange(type){
  if(type==='상시'){
    document.getElementById('task-suggestions-wrap').style.display='none';
    return;
  }
  // Load all tasks of this type, get unique names
  const{data}=await sb.from('tasks').select('name,task_key,task_type').eq('task_type',type);
  if(!data||!data.length){
    document.getElementById('task-suggestions-wrap').style.display='none';
    return;
  }
  const names=[...new Set(data.map(t=>t.task_key||t.name))];
  const wrap=document.getElementById('task-suggestions-wrap');
  const container=document.getElementById('task-suggestions');
  container.innerHTML=names.map(n=>`
    <button type="button" onclick="selectSuggestedTask('${n.replace(/'/g,"\\'")}')"
      style="background:var(--bg);border:1px solid var(--border2);border-radius:99px;padding:0.3em 0.85em;color:var(--text2);font-size:0.85em;cursor:pointer;font-family:var(--sans);transition:all 0.15s;font-weight:500;"
      onmouseover="this.style.borderColor='var(--accent)';this.style.color='var(--accent2)'"
      onmouseout="if(document.getElementById('k-name').value!==this.textContent.trim()){this.style.borderColor='var(--border2)';this.style.color='var(--text2)';this.style.background='var(--bg)';}"
    >${n}</button>
  `).join('');
  wrap.style.display='block';
}

function selectSuggestedTask(name){
  document.getElementById('k-name').value=name;
  // Highlight selected
  document.querySelectorAll('#task-suggestions button').forEach(b=>{
    b.style.background=b.textContent.trim()===name?'var(--accent-bg)':'var(--bg)';
    b.style.borderColor=b.textContent.trim()===name?'var(--accent)':'var(--border2)';
    b.style.color=b.textContent.trim()===name?'var(--accent2)':'var(--text2)';
  });
}

/* ── Responsive Font Scaling ── */
function fmtInput(el){
  const raw=el.value.replace(/[^0-9]/g,'');
  const num=parseInt(raw)||0;
  el.value=num===0?'':num.toLocaleString('ko-KR');
  el.dataset.raw=raw;
}

function getAmountVal(){
  const el=document.getElementById('tr-amount');
  return parseInt((el.dataset.raw||el.value.replace(/[^0-9]/g,''))||'0');
}

function applyFontScale(){
  const w=window.innerWidth;
  let base;
  if(w>=2400) base=15.5;
  else if(w>=2000) base=14.5;
  else if(w>=1600) base=13.5;
  else if(w>=1400) base=13.5;
  else if(w>=1200) base=12.5;
  else if(w>=900) base=11.5;
  else base=10.5;
  // Set root font size - all rem/em values scale automatically
  document.documentElement.style.setProperty('--base',base+'px');
  document.body.style.fontSize=base+'px';
  // Scale layout columns proportionally
  const ratio=base/14;
  const col1=Math.round(220*ratio);
  const col3=Math.round(340*ratio);
}
window.addEventListener('resize', applyFontScale);
window.addEventListener('keydown', e=>{
  if(e.key==='Escape'){
    document.querySelectorAll('.overlay.open').forEach(el=>{
      el.classList.remove('open');
    });
  }
});

async function init(){
  const now=new Date();curY=now.getFullYear();curM=now.getMonth();
  document.getElementById('mlabel').textContent=`${curY}년 ${curM+1}월`;
  applyFontScale();
  document.getElementById('detail').innerHTML=`<div class="dempty"><div style="font-size:2em">👆</div><div style="text-align:center;line-height:1.8;font-size:0.85em">날짜를 클릭하면<br>업무 상세가 보여요</div></div>`;
  initMemoColorPicker();
  try{ const saved=localStorage.getItem('memoGroupOrder'); if(saved) _memoGroupOrder=JSON.parse(saved); }catch(e){}
  await loadAll();
  // Restore page from URL hash (after data is loaded)
  if(location.hash==='#notice') showPage('notice');
  else if(location.hash==='#memo') showPage('memo');
  else if(location.hash==='#template') showPage('template');
}
init();
</script>
